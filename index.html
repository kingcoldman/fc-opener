<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Ultimate Team Card Creator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,800;0,900;1,900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #06090e;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 30px 15px;
            overflow-x: hidden;
        }

        h1 {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
            text-align: center;
        }

        /* SEARCH CONTAINER */
        .search-container {
            position: relative;
            width: 300px;
            margin-bottom: 25px;
            z-index: 20;
        }

        .search-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 14px;
            font-weight: 900;
            border-radius: 12px;
            background: #111723;
            color: #ffffff;
            border: 2px solid #00ff88;
            outline: none;
            box-shadow: 0 4px 20px rgba(0, 255, 136, 0.2);
            text-transform: uppercase;
        }

        .suggestions-list {
            position: absolute;
            top: 55px;
            left: 0;
            right: 0;
            background: #111723;
            border: 1px solid #00ff88;
            border-radius: 12px;
            max-height: 220px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            z-index: 30;
        }

        .suggestions-list.active {
            display: block;
        }

        .suggestion-item {
            padding: 12px 16px;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .suggestion-item:hover {
            background: #00ff88;
            color: #06090e;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 300px;
            gap: 20px;
        }

        /* ASSET-BASED CARD FRAME WRAPPER */
        .card-wrapper {
            width: 300px;
            height: 460px;
            position: relative;
            user-select: none;
            filter: drop-shadow(0px 15px 25px rgba(0, 0, 0, 0.8));
        }

        .card-bg-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* CARD CONTENT OVERLAYS */
        .card-top-panel {
            position: absolute;
            top: 48px;
            left: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
        }

        .overall-rating {
            font-size: 42px;
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -2px;
        }

        .position {
            font-size: 15px;
            font-weight: 900;
            margin-top: 4px;
            text-transform: uppercase;
        }

        .player-img-container {
            position: absolute;
            width: 230px;
            height: 230px;
            bottom: 150px;
            right: -10px;
            z-index: 3;
            pointer-events: none;
        }

        .player-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0px 8px 12px rgba(0, 0, 0, 0.6));
            transition: opacity 0.3s ease;
        }

        .player-name-banner {
            position: absolute;
            width: 80%;
            left: 10%;
            top: 268px;
            text-align: center;
            font-size: 19px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 5;
            padding: 3px 0;
        }

        .stats-grid {
            position: absolute;
            bottom: 42px;
            left: 35px;
            right: 35px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            z-index: 5;
        }

        .stats-col {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stat-item {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
        }

        .stat-item:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .stat-val {
            font-weight: 900;
            font-size: 17px;
            width: 24px;
            text-align: right;
        }

        .stat-lbl {
            font-weight: 800;
            font-size: 12px;
            opacity: 0.85;
            width: 30px;
            text-align: left;
        }

        .stat-divider {
            width: 1px;
            height: 65px;
            margin: 0 6px;
            background: currentColor;
            opacity: 0.35;
        }

        /* CARD TIER COLOR THEMES */
        .theme-blank { color: #5d6d88; }
        .theme-bronze { color: #231103; }
        .theme-silver { color: #1a1a1a; }
        .theme-gold { color: #2e2000; }
        .theme-toty { color: #ffffff; text-shadow: 0 0 8px rgba(112, 238, 255, 0.6); }
        .theme-icon { color: #1a1608; text-shadow: 0 0 6px rgba(255, 255, 255, 0.5); }

        .spin-wheel-trigger-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00ff88 0%, #00b359 100%);
            color: #06090e;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.3);
        }

        .spin-wheel-trigger-btn:disabled {
            background: #253346;
            color: #5d6d88;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* MODAL OVERLAY & WHEEL */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(4, 6, 10, 0.88);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .control-panel {
            background: #0f1522;
            border: 2px solid #00ff88;
            border-radius: 20px;
            padding: 20px;
            width: min(90vw, 380px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .wheel-header {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
        }

        .status-msg {
            font-size: 18px;
            color: #00ff88;
            font-weight: 900;
        }

        .close-btn {
            background: #ff4757;
            color: white;
            border: none;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .wheel-box {
            position: relative;
            width: 280px; 
            height: 280px;
            overflow: hidden;
            border-radius: 50%;
            border: 4px solid #00ff88;
        }

        .wheel-svg {
            width: 100%;
            height: 100%;
            transform: rotate(0deg);
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
        }

        .wheel-pointer {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #ffffff;
            z-index: 10;
        }

        .spin-btn {
            background: #00ff88;
            color: #06090e;
            font-size: 16px;
            font-weight: 900;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h1>FC Ultimate Team</h1>

    <div class="search-container">
        <input type="text" id="playerSearch" class="search-input" placeholder="Search player name..." autocomplete="off">
        <div class="suggestions-list" id="suggestionsList"></div>
    </div>

    <div class="game-container">
        <div class="card-wrapper theme-blank" id="fcCard">
            <div class="card-bg-svg" id="cardBgSvg"></div>

            <div class="player-img-container">
                <img src="" alt="Player" class="player-img" id="playerPic" style="opacity: 0;">
            </div>

            <div class="card-top-panel">
                <div class="overall-rating" id="cardOvr">--</div>
                <div class="position" id="cardPos">--</div>
            </div>

            <div class="player-name-banner" id="cardName">SELECT PLAYER</div>
            
            <div class="stats-grid">
                <div class="stats-col">
                    <div class="stat-item" id="itemPAC"><span class="stat-val" id="statPAC">--</span> <span class="stat-lbl">PAC</span></div>
                    <div class="stat-item" id="itemSHO"><span class="stat-val" id="statSHO">--</span> <span class="stat-lbl">SHO</span></div>
                    <div class="stat-item" id="itemPAS"><span class="stat-val" id="statPAS">--</span> <span class="stat-lbl">PAS</span></div>
                </div>

                <div class="stat-divider"></div>

                <div class="stats-col">
                    <div class="stat-item" id="itemDRI"><span class="stat-val" id="statDRI">--</span> <span class="stat-lbl">DRI</span></div>
                    <div class="stat-item" id="itemDEF"><span class="stat-val" id="statDEF">--</span> <span class="stat-lbl">DEF</span></div>
                    <div class="stat-item" id="itemPHY"><span class="stat-val" id="statPHY">--</span> <span class="stat-lbl">PHY</span></div>
                </div>
            </div>
        </div>

        <button class="spin-wheel-trigger-btn" id="openWheelBtn" disabled>🎡 SPIN STAT WHEEL</button>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="control-panel">
            <div class="wheel-header">
                <div class="status-msg" id="statusMsg">Select a stat!</div>
                <button class="close-btn" id="closeBtn">✕ Close</button>
            </div>
            <div class="wheel-box">
                <div class="wheel-pointer"></div>
                <svg class="wheel-svg" id="wheelSvg" viewBox="0 0 300 300"></svg>
            </div>
            <button class="spin-btn" id="spinBtn">Spin Wheel</button>
        </div>
    </div>

    <script>
        const playerSearch = document.getElementById("playerSearch");
        const suggestionsList = document.getElementById("suggestionsList");
        const spinBtn = document.getElementById("spinBtn");
        const closeBtn = document.getElementById("closeBtn");
        const openWheelBtn = document.getElementById("openWheelBtn");
        const wheelSvg = document.getElementById("wheelSvg");
        const modalOverlay = document.getElementById("modalOverlay");
        const statusMsg = document.getElementById("statusMsg");

        const fcCard = document.getElementById("fcCard");
        const cardBgSvg = document.getElementById("cardBgSvg");
        const cardName = document.getElementById("cardName");
        const cardOvr = document.getElementById("cardOvr");
        const cardPos = document.getElementById("cardPos");
        const playerPic = document.getElementById("playerPic");

        const stats = {
            PAC: { val: document.getElementById("statPAC"), item: document.getElementById("itemPAC") },
            SHO: { val: document.getElementById("statSHO"), item: document.getElementById("itemSHO") },
            PAS: { val: document.getElementById("statPAS"), item: document.getElementById("itemPAS") },
            DRI: { val: document.getElementById("statDRI"), item: document.getElementById("itemDRI") },
            DEF: { val: document.getElementById("statDEF"), item: document.getElementById("itemDEF") },
            PHY: { val: document.getElementById("statPHY"), item: document.getElementById("itemPHY") }
        };

        let selectedPlayer = null;
        let activeStatKey = "PAC";
        let cardStats = { PAC: null, DRI: null, SHO: null, DEF: null, PAS: null, PHY: null };
        let currentRotation = 0;

        const defaultSilhouette = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='32' r='20' fill='%23ffffff'/><path d='M20 90 C20 60, 30 50, 50 50 C70 50, 80 60, 80 90 Z' fill='%23ffffff'/></svg>";

        playerPic.onerror = function() {
            this.src = defaultSilhouette;
        };

        const wheelNumbers = [];
        for (let i = 50; i <= 99; i++) wheelNumbers.push(i);
        const totalSegments = wheelNumbers.length;
        const segmentAngle = 360 / totalSegments;

        const playersDb = [
            { id: "pelé", name: "Pelé", pos: "CAM", isIcon: true },
            { id: "zidane", name: "Zidane", pos: "CM", isIcon: true },
            { id: "mbappe", name: "Mbappé", pos: "ST" },
            { id: "haaland", name: "Haaland", pos: "ST" },
            { id: "bellingham", name: "Bellingham", pos: "CAM" },
            { id: "messi", name: "Messi", pos: "CF" },
            { id: "ronaldo", name: "Ronaldo", pos: "ST" },
            { id: "vini", name: "Vinícius Jr.", pos: "LW" },
            { id: "yamal", name: "Lamine Yamal", pos: "RW" },
            { id: "saka", name: "Saka", pos: "RW" }
        ];

        /* DETAILED SVG CARD TEMPLATES (OPTION B) */
        const cardTemplates = {
            blank: `<svg viewBox="0 0 300 460" xmlns="http://www.w3.org/2000/svg"><path d="M 54 0 L 246 0 L 300 41 L 300 359 L 150 460 L 0 359 L 0 41 Z" fill="#121824" stroke="#2a364f" stroke-width="4"/><path d="M 18 30 L 282 30 L 282 340 L 150 435 L 18 340 Z" fill="#0d121a"/></svg>`,
            
            bronze: `<svg viewBox="0 0 300 460" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="bronzeBorder" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f3d1b5"/><stop offset="50%" stop-color="#8a4d1d"/><stop offset="100%" stop-color="#3d1e05"/></linearGradient>
                    <radialGradient id="bronzeBg" cx="50%" cy="30%" r="70%"><stop offset="0%" stop-color="#c4834d"/><stop offset="60%" stop-color="#693710"/><stop offset="100%" stop-color="#231103"/></radialGradient>
                </defs>
                <path d="M 54 0 L 246 0 L 300 41 L 300 359 L 150 460 L 0 359 L 0 41 Z" fill="url(#bronzeBg)" stroke="url(#bronzeBorder)" stroke-width="6"/>
                <path d="M 18 30 L 282 30 L 282 345 L 150 435 L 18 345 Z" fill="none" stroke="#f3d1b5" stroke-width="1.5" stroke-opacity="0.4"/>
                <line x1="20" y1="265" x2="280" y2="265" stroke="#231103" stroke-width="3"/>
                <line x1="20" y1="295" x2="280" y2="295" stroke="#231103" stroke-width="3"/>
            </svg>`,

            silver: `<svg viewBox="0 0 300 460" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="silverBorder" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="50%" stop-color="#a0a0a0"/><stop offset="100%" stop-color="#404040"/></linearGradient>
                    <radialGradient id="silverBg" cx="50%" cy="30%" r="70%"><stop offset="0%" stop-color="#e6e6e6"/><stop offset="50%" stop-color="#999999"/><stop offset="100%" stop-color="#2b2b2b"/></radialGradient>
                </defs>
                <path d="M 54 0 L 246 0 L 300 41 L 300 359 L 150 460 L 0 359 L 0 41 Z" fill="url(#silverBg)" stroke="url(#silverBorder)" stroke-width="6"/>
                <path d="M 18 30 L 282 30 L 282 345 L 150 435 L 18 345 Z" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.5"/>
                <line x1="20" y1="265" x2="280" y2="265" stroke="#1a1a1a" stroke-width="3"/>
                <line x1="20" y1="295" x2="280" y2="295" stroke="#1a1a1a" stroke-width="3"/>
            </svg>`,

            gold: `<svg viewBox="0 0 300 460" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffe89c"/><stop offset="30%" stop-color="#dfb241"/><stop offset="70%" stop-color="#8a640f"/><stop offset="100%" stop-color="#422e00"/></linearGradient>
                    <radialGradient id="goldInner" cx="50%" cy="25%" r="75%"><stop offset="0%" stop-color="#fff8d6"/><stop offset="45%" stop-color="#cca031"/><stop offset="85%" stop-color="#694b00"/></radialGradient>
                </defs>
                <path d="M 54 0 L 246 0 L 300 41 L 300 359 L 150 460 L 0 359 L 0 41 Z" fill="url(#goldInner)" stroke="url(#goldGrad)" stroke-width="6"/>
                <polygon points="150,15 285,45 285,345 150,440 15,345 15,45" fill="none" stroke="#ffe89c" stroke-width="2" stroke-opacity="0.6"/>
                <line x1="20" y1="265" x2="280" y2="265" stroke="#2e2000" stroke-width="3"/>
                <line x1="20" y1="295" x2="280" y2="295" stroke="#2e2000" stroke-width="3"/>
            </svg>`,

            toty: `<svg viewBox="0 0 300 460" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="totyBorder" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#70eeff"/><stop offset="50%" stop-color="#0055ff"/><stop offset="100%" stop-color="#001147"/></linearGradient>
                    <radialGradient id="totyBg" cx="50%" cy="20%" r="80%"><stop offset="0%" stop-color="#00d9ff"/><stop offset="35%" stop-color="#003cd6"/><stop offset="75%" stop-color="#020d38"/><stop offset="100%" stop-color="#010517"/></radialGradient>
                </defs>
                <path d="M 54 0 L 246 0 L 300 41 L 300 359 L 150 460 L 0 359 L 0 41 Z" fill="url(#totyBg)" stroke="url(#totyBorder)" stroke-width="7"/>
                <polygon points="150,12 288,43 288,348 150,444 12,348 12,43" fill="none" stroke="#70eeff" stroke-width="2.5" stroke-opacity="0.8"/>
                <path d="M 30 180 L 150 20 L 270 180" fill="none" stroke="#70eeff" stroke-width="1" stroke-opacity="0.3"/>
                <line x1="20" y1="265" x2="280" y2="265" stroke="#70eeff" stroke-width="3"/>
                <line x1="20" y1="295" x2="280" y2="295" stroke="#70eeff" stroke-width="3"/>
            </svg>`,

            icon: `<svg viewBox="0 0 300 460" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="iconBorder" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="50%" stop-color="#e6c65c"/><stop offset="100%" stop-color="#544413"/></linearGradient>
                    <radialGradient id="iconBg" cx="50%" cy="25%" r="75%"><stop offset="0%" stop-color="#ffffff"/><stop offset="40%" stop-color="#f5e8be"/><stop offset="80%" stop-color="#c9a238"/><stop offset="100%" stop-color="#241c03"/></radialGradient>
                </defs>
                <path d="M 54 0 L 246 0 L 300 41 L 300 359 L 150 460 L 0 359 L 0 41 Z" fill="url(#iconBg)" stroke="url(#iconBorder)" stroke-width="6"/>
                <polygon points="150,14 286,44 286,346 150,442 14,346 14,44" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.7"/>
                <line x1="20" y1="265" x2="280" y2="265" stroke="#1a1608" stroke-width="3"/>
                <line x1="20" y1="295" x2="280" y2="295" stroke="#1a1608" stroke-width="3"/>
            </svg>`
        };

        playerSearch.addEventListener("input", () => {
            const query = playerSearch.value.trim().toLowerCase();
            suggestionsList.innerHTML = "";

            if (!query) {
                suggestionsList.classList.remove("active");
                return;
            }

            const matches = playersDb.filter(p => p.name.toLowerCase().includes(query));

            if (matches.length > 0) {
                matches.forEach(p => {
                    const item = document.createElement("div");
                    item.className = "suggestion-item";
                    item.innerHTML = `<span>${p.name}</span> <strong>${p.pos}</strong>`;
                    item.addEventListener("click", () => selectPlayer(p));
                    suggestionsList.appendChild(item);
                });
                suggestionsList.classList.add("active");
            } else {
                suggestionsList.classList.remove("active");
            }
        });

        function selectPlayer(player) {
            selectedPlayer = player;
            playerSearch.value = player.name;
            suggestionsList.classList.remove("active");

            cardName.innerText = player.name;
            cardPos.innerText = player.pos;

            playerPic.style.opacity = "0";
            playerPic.src = player.img || defaultSilhouette;
            playerPic.onload = () => { playerPic.style.opacity = "1"; };

            openWheelBtn.disabled = false;
            resetCardStats();
            updateCardTier(85);
        }

        function resetCardStats() {
            cardOvr.innerText = "--";
            for (const s in stats) {
                cardStats[s] = null;
                stats[s].val.innerText = "--";
            }
        }

        function updateCardTier(ovr) {
            fcCard.className = "card-wrapper";

            if (selectedPlayer && selectedPlayer.isIcon) {
                fcCard.classList.add("theme-icon");
                cardBgSvg.innerHTML = cardTemplates.icon;
                return;
            }

            if (ovr === null || isNaN(ovr)) {
                fcCard.classList.add("theme-blank");
                cardBgSvg.innerHTML = cardTemplates.blank;
                return;
            }

            if (ovr < 65) {
                fcCard.classList.add("theme-bronze");
                cardBgSvg.innerHTML = cardTemplates.bronze;
            } else if (ovr < 75) {
                fcCard.classList.add("theme-silver");
                cardBgSvg.innerHTML = cardTemplates.silver;
            } else if (ovr < 92) {
                fcCard.classList.add("theme-gold");
                cardBgSvg.innerHTML = cardTemplates.gold;
            } else {
                fcCard.classList.add("theme-toty");
                cardBgSvg.innerHTML = cardTemplates.toty;
            }
        }

        function buildNumberedWheel() {
            let svgContent = "";
            const cx = 150, cy = 150, r = 140;

            wheelNumbers.forEach((num, index) => {
                const startAngle = index * segmentAngle;
                const endAngle = (index + 1) * segmentAngle;
                
                const radStart = ((startAngle - 90) * Math.PI) / 180;
                const radEnd = ((endAngle - 90) * Math.PI) / 180;

                const x1 = cx + r * Math.cos(radStart);
                const y1 = cy + r * Math.sin(radStart);
                const x2 = cx + r * Math.cos(radEnd);
                const y2 = cy + r * Math.sin(radEnd);

                const color = index % 2 === 0 ? "#0f2027" : "#203a43";
                
                svgContent += `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z" fill="${color}" stroke="#00ff88" stroke-width="0.5"/>`;

                const textAngle = startAngle + (segmentAngle / 2);
                const textRad = ((textAngle - 90) * Math.PI) / 180;
                const textR = r - 20; 
                const tx = cx + textR * Math.cos(textRad);
                const ty = cy + textR * Math.sin(textRad);

                svgContent += `<text x="${tx}" y="${ty}" fill="#00ff88" font-size="8" font-weight="900" text-anchor="middle" transform="rotate(${textAngle}, ${tx}, ${ty})" dominant-baseline="central">${num}</text>`;
            });

            svgContent += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#00ff88" stroke-width="3"/>`;
            svgContent += `<circle cx="${cx}" cy="${cy}" r="20" fill="#00ff88" stroke="#06090e" stroke-width="3"/>`;

            wheelSvg.innerHTML = svgContent;
        }

        function selectStat(statKey) {
            if (!selectedPlayer) return;

            if (!statKey) {
                const unspunKey = Object.keys(cardStats).find(key => cardStats[key] === null);
                activeStatKey = unspunKey || "PAC";
            } else {
                activeStatKey = statKey;
            }

            modalOverlay.classList.add("visible");
            spinBtn.disabled = false;
            spinBtn.innerText = `SPIN FOR ${activeStatKey}`;
            statusMsg.innerText = `ROLLING ${activeStatKey}`;
        }

        closeBtn.addEventListener("click", () => modalOverlay.classList.remove("visible"));
        openWheelBtn.addEventListener("click", () => selectStat(null));

        Object.keys(stats).forEach(statKey => {
            stats[statKey].item.addEventListener("click", () => selectStat(statKey));
        });

        spinBtn.addEventListener("click", () => {
            if (!activeStatKey) return;

            spinBtn.disabled = true;
            spinBtn.innerText = "SPINNING...";

            const selectedIndex = Math.floor(Math.random() * totalSegments);
            const chosenValue = wheelNumbers[selectedIndex];

            const targetWedgeAngle = (selectedIndex * segmentAngle) + (segmentAngle / 2);
            const correctiveRotation = 360 - targetWedgeAngle; 

            const extraSpins = 1440; 
            currentRotation += extraSpins + correctiveRotation - (currentRotation % 360);

            wheelSvg.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                cardStats[activeStatKey] = chosenValue;
                stats[activeStatKey].val.innerText = chosenValue;

                let sum = 0, count = 0;
                for (const s in cardStats) {
                    if (cardStats[s] !== null) {
                        sum += cardStats[s];
                        count++;
                    }
                }
                const finalOvr = Math.round(sum / count);
                cardOvr.innerText = finalOvr;
                
                updateCardTier(finalOvr);

                spinBtn.innerText = "DONE!";
                statusMsg.innerText = `LANDED ON ${chosenValue}!`;
                
                setTimeout(() => {
                    if (modalOverlay.classList.contains("visible")) closeBtn.click();
                }, 1200);
            }, 4000);
        });

        // Initialize default blank frame
        cardBgSvg.innerHTML = cardTemplates.blank;
        buildNumberedWheel();
    </script>
</body>
</html>
