<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Ultimate Team Card Creator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,800;0,900;1,900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #080c14;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 30px 15px;
            overflow-x: hidden;
        }

        h1 {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
            text-align: center;
        }

        /* SEARCH CONTAINER */
        .search-container {
            position: relative;
            width: 300px;
            margin-bottom: 25px;
            z-index: 20;
        }

        .search-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 14px;
            font-weight: 900;
            border-radius: 12px;
            background: #111723;
            color: #ffffff;
            border: 2px solid #00ff88;
            outline: none;
            box-shadow: 0 4px 20px rgba(0, 255, 136, 0.2);
            text-transform: uppercase;
        }

        .suggestions-list {
            position: absolute;
            top: 55px;
            left: 0;
            right: 0;
            background: #111723;
            border: 1px solid #00ff88;
            border-radius: 12px;
            max-height: 220px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            z-index: 30;
        }

        .suggestions-list.active {
            display: block;
        }

        .suggestion-item {
            padding: 12px 16px;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .suggestion-item:hover {
            background: #00ff88;
            color: #06090e;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 300px;
            gap: 20px;
        }

        /* DEFAULT BLANK CARD */
        .card-blank {
            width: 300px;
            height: 460px;
            position: relative;
            clip-path: polygon(18% 0%, 82% 0%, 100% 9%, 100% 78%, 50% 100%, 0% 78%, 0% 9%);
            background: linear-gradient(135deg, #1c2430 0%, #0d121a 100%);
            color: #5d6d88;
            overflow: hidden;
            user-select: none;
        }

        /* ================================================== */
        /* 1. RARE GOLD CARD - EXACTLY 50 LINES OF CSS STYLES */
        /* ================================================== */
        .card-gold {
            width: 300px;
            height: 460px;
            position: relative;
            clip-path: polygon(18% 0%, 82% 0%, 100% 9%, 100% 78%, 50% 100%, 0% 78%, 0% 9%);
            background: radial-gradient(
                ellipse at 50% 30%,
                #fff4c2 0%,
                #e1ba52 40%,
                #a27b1e 75%,
                #4a3600 100%
            );
            color: #2e2000;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.8);
            border: 2px solid #e1ba52;
            overflow: hidden;
            user-select: none;
        }
        .card-gold .card-top-panel {
            position: absolute;
            top: 45px;
            left: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.4);
        }
        .card-gold .overall-rating {
            font-size: 44px;
            font-weight: 900;
            line-height: 0.8;
            letter-spacing: -2px;
            color: #2e2000;
        }
        .card-gold .position {
            font-size: 15px;
            font-weight: 900;
            margin-top: 5px;
            text-transform: uppercase;
            color: #3d2b00;
        }
        .card-gold .player-name-banner {
            background: linear-gradient(90deg, transparent 0%, rgba(74, 54, 0, 0.25) 20%, rgba(74, 54, 0, 0.25) 80%, transparent 100%);
            border-bottom: 2px solid #2e2000;
            color: #2e2000;
        }

        /* ================================================== */
        /* 2. TOTY BLUE CARD - EXACTLY 50 LINES OF CSS STYLES */
        /* ================================================== */
        .card-toty {
            width: 300px;
            height: 460px;
            position: relative;
            clip-path: polygon(18% 0%, 82% 0%, 100% 9%, 100% 78%, 50% 100%, 0% 78%, 0% 9%);
            background: radial-gradient(
                ellipse at 50% 20%,
                #70eeff 0%,
                #004ae2 45%,
                #031038 85%,
                #010619 100%
            );
            color: #ffffff;
            box-shadow: 0 15px 30px rgba(0, 74, 226, 0.5);
            border: 2px solid #70eeff;
            overflow: hidden;
            user-select: none;
        }
        .card-toty .card-top-panel {
            position: absolute;
            top: 45px;
            left: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
            text-shadow: 0 0 10px rgba(112, 238, 255, 0.6);
        }
        .card-toty .overall-rating {
            font-size: 44px;
            font-weight: 900;
            line-height: 0.8;
            letter-spacing: -2px;
            color: #ffffff;
        }
        .card-toty .position {
            font-size: 15px;
            font-weight: 900;
            margin-top: 5px;
            text-transform: uppercase;
            color: #70eeff;
        }
        .card-toty .player-name-banner {
            background: linear-gradient(90deg, transparent 0%, rgba(0, 74, 226, 0.4) 20%, rgba(0, 74, 226, 0.4) 80%, transparent 100%);
            border-bottom: 2px solid #70eeff;
            color: #ffffff;
        }

        /* ================================================== */
        /* 3. RARE SILVER CARD - EXACTLY 50 LINES OF CSS      */
        /* ================================================== */
        .card-silver {
            width: 300px;
            height: 460px;
            position: relative;
            clip-path: polygon(18% 0%, 82% 0%, 100% 9%, 100% 78%, 50% 100%, 0% 78%, 0% 9%);
            background: radial-gradient(
                ellipse at 50% 30%,
                #ffffff 0%,
                #c0c0c0 40%,
                #707070 75%,
                #2a2a2a 100%
            );
            color: #1a1a1a;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.8);
            border: 2px solid #c0c0c0;
            overflow: hidden;
            user-select: none;
        }
        .card-silver .card-top-panel {
            position: absolute;
            top: 45px;
            left: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.5);
        }
        .card-silver .overall-rating {
            font-size: 44px;
            font-weight: 900;
            line-height: 0.8;
            letter-spacing: -2px;
            color: #1a1a1a;
        }
        .card-silver .position {
            font-size: 15px;
            font-weight: 900;
            margin-top: 5px;
            text-transform: uppercase;
            color: #2b2b2b;
        }
        .card-silver .player-name-banner {
            background: linear-gradient(90deg, transparent 0%, rgba(40, 40, 40, 0.25) 20%, rgba(40, 40, 40, 0.25) 80%, transparent 100%);
            border-bottom: 2px solid #1a1a1a;
            color: #1a1a1a;
        }

        /* ================================================== */
        /* 4. RARE BRONZE CARD - EXACTLY 50 LINES OF CSS      */
        /* ================================================== */
        .card-bronze {
            width: 300px;
            height: 460px;
            position: relative;
            clip-path: polygon(18% 0%, 82% 0%, 100% 9%, 100% 78%, 50% 100%, 0% 78%, 0% 9%);
            background: radial-gradient(
                ellipse at 50% 30%,
                #f3d1b5 0%,
                #b87333 40%,
                #6e3b12 75%,
                #2b1200 100%
            );
            color: #2b1200;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.8);
            border: 2px solid #b87333;
            overflow: hidden;
            user-select: none;
        }
        .card-bronze .card-top-panel {
            position: absolute;
            top: 45px;
            left: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.3);
        }
        .card-bronze .overall-rating {
            font-size: 44px;
            font-weight: 900;
            line-height: 0.8;
            letter-spacing: -2px;
            color: #2b1200;
        }
        .card-bronze .position {
            font-size: 15px;
            font-weight: 900;
            margin-top: 5px;
            text-transform: uppercase;
            color: #3e1b00;
        }
        .card-bronze .player-name-banner {
            background: linear-gradient(90deg, transparent 0%, rgba(43, 18, 0, 0.25) 20%, rgba(43, 18, 0, 0.25) 80%, transparent 100%);
            border-bottom: 2px solid #2b1200;
            color: #2b1200;
        }

        /* ================================================== */
        /* 5. ICON CARD - EXACTLY 50 LINES OF CSS STYLES      */
        /* ================================================== */
        .card-icon {
            width: 300px;
            height: 460px;
            position: relative;
            clip-path: polygon(18% 0%, 82% 0%, 100% 9%, 100% 78%, 50% 100%, 0% 78%, 0% 9%);
            background: radial-gradient(
                ellipse at 50% 25%,
                #ffffff 0%,
                #f7f0dc 35%,
                #d4af37 75%,
                #1c180a 100%
            );
            color: #1a1608;
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4);
            border: 2px solid #e6c65c;
            overflow: hidden;
            user-select: none;
        }
        .card-icon .card-top-panel {
            position: absolute;
            top: 45px;
            left: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
        }
        .card-icon .overall-rating {
            font-size: 44px;
            font-weight: 900;
            line-height: 0.8;
            letter-spacing: -2px;
            color: #1a1608;
        }
        .card-icon .position {
            font-size: 15px;
            font-weight: 900;
            margin-top: 5px;
            text-transform: uppercase;
            color: #3b3110;
        }
        .card-icon .player-name-banner {
            background: linear-gradient(90deg, transparent 0%, rgba(212, 175, 55, 0.3) 20%, rgba(212, 175, 55, 0.3) 80%, transparent 100%);
            border-bottom: 2px solid #1a1608;
            color: #1a1608;
        }

        /* SHARED INTERNAL CARD ELEMENTS */
        .card-top-panel {
            position: absolute;
            top: 45px;
            left: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
        }

        .overall-rating {
            font-size: 44px;
            font-weight: 900;
            line-height: 0.8;
            letter-spacing: -2px;
        }

        .position {
            font-size: 15px;
            font-weight: 900;
            margin-top: 5px;
            text-transform: uppercase;
        }

        .player-img-container {
            position: absolute;
            width: 250px;
            height: 250px;
            bottom: 140px;
            right: -20px;
            z-index: 3;
            pointer-events: none;
        }

        .player-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0px 8px 12px rgba(0, 0, 0, 0.6));
            transition: opacity 0.3s ease;
        }

        .player-name-banner {
            position: absolute;
            width: 86%;
            left: 7%;
            top: 270px;
            text-align: center;
            font-size: 19px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 5;
            padding: 4px 0;
        }

        .stats-grid {
            position: absolute;
            bottom: 38px;
            left: 30px;
            right: 30px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            z-index: 5;
        }

        .stats-col {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stat-item {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
        }

        .stat-item:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .stat-val {
            font-weight: 900;
            font-size: 18px;
            width: 24px;
            text-align: right;
        }

        .stat-lbl {
            font-weight: 800;
            font-size: 13px;
            opacity: 0.85;
            width: 30px;
            text-align: left;
        }

        .stat-divider {
            width: 1px;
            height: 70px;
            margin: 0 8px;
            background: currentColor;
            opacity: 0.35;
        }

        .spin-wheel-trigger-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00ff88 0%, #00b359 100%);
            color: #06090e;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.3);
        }

        .spin-wheel-trigger-btn:disabled {
            background: #253346;
            color: #5d6d88;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* MODAL OVERLAY & WHEEL */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(4, 6, 10, 0.88);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .control-panel {
            background: #0f1522;
            border: 2px solid #00ff88;
            border-radius: 20px;
            padding: 20px;
            width: min(90vw, 380px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .wheel-header {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
        }

        .status-msg {
            font-size: 18px;
            color: #00ff88;
            font-weight: 900;
        }

        .close-btn {
            background: #ff4757;
            color: white;
            border: none;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .wheel-box {
            position: relative;
            width: 280px; 
            height: 280px;
            overflow: hidden;
            border-radius: 50%;
            border: 4px solid #00ff88;
        }

        .wheel-svg {
            width: 100%;
            height: 100%;
            transform: rotate(0deg);
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
        }

        .wheel-pointer {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #ffffff;
            z-index: 10;
        }

        .spin-btn {
            background: #00ff88;
            color: #06090e;
            font-size: 16px;
            font-weight: 900;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h1>FC Ultimate Team</h1>

    <div class="search-container">
        <input type="text" id="playerSearch" class="search-input" placeholder="Search player name..." autocomplete="off">
        <div class="suggestions-list" id="suggestionsList"></div>
    </div>

    <div class="game-container">
        <div class="card-blank" id="fcCard">
            <div class="player-img-container">
                <img src="" alt="Player" class="player-img" id="playerPic" style="opacity: 0;">
            </div>

            <div class="card-top-panel">
                <div class="overall-rating" id="cardOvr">--</div>
                <div class="position" id="cardPos">--</div>
            </div>

            <div class="player-name-banner" id="cardName">SELECT PLAYER</div>
            
            <div class="stats-grid">
                <div class="stats-col">
                    <div class="stat-item" id="itemPAC"><span class="stat-val" id="statPAC">--</span> <span class="stat-lbl">PAC</span></div>
                    <div class="stat-item" id="itemSHO"><span class="stat-val" id="statSHO">--</span> <span class="stat-lbl">SHO</span></div>
                    <div class="stat-item" id="itemPAS"><span class="stat-val" id="statPAS">--</span> <span class="stat-lbl">PAS</span></div>
                </div>

                <div class="stat-divider"></div>

                <div class="stats-col">
                    <div class="stat-item" id="itemDRI"><span class="stat-val" id="statDRI">--</span> <span class="stat-lbl">DRI</span></div>
                    <div class="stat-item" id="itemDEF"><span class="stat-val" id="statDEF">--</span> <span class="stat-lbl">DEF</span></div>
                    <div class="stat-item" id="itemPHY"><span class="stat-val" id="statPHY">--</span> <span class="stat-lbl">PHY</span></div>
                </div>
            </div>
        </div>

        <button class="spin-wheel-trigger-btn" id="openWheelBtn" disabled>🎡 SPIN STAT WHEEL</button>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="control-panel">
            <div class="wheel-header">
                <div class="status-msg" id="statusMsg">Select a stat!</div>
                <button class="close-btn" id="closeBtn">✕ Close</button>
            </div>
            <div class="wheel-box">
                <div class="wheel-pointer"></div>
                <svg class="wheel-svg" id="wheelSvg" viewBox="0 0 300 300"></svg>
            </div>
            <button class="spin-btn" id="spinBtn">Spin Wheel</button>
        </div>
    </div>

    <script>
        const playerSearch = document.getElementById("playerSearch");
        const suggestionsList = document.getElementById("suggestionsList");
        const spinBtn = document.getElementById("spinBtn");
        const closeBtn = document.getElementById("closeBtn");
        const openWheelBtn = document.getElementById("openWheelBtn");
        const wheelSvg = document.getElementById("wheelSvg");
        const modalOverlay = document.getElementById("modalOverlay");
        const statusMsg = document.getElementById("statusMsg");

        const fcCard = document.getElementById("fcCard");
        const cardName = document.getElementById("cardName");
        const cardOvr = document.getElementById("cardOvr");
        const cardPos = document.getElementById("cardPos");
        const playerPic = document.getElementById("playerPic");

        const stats = {
            PAC: { val: document.getElementById("statPAC"), item: document.getElementById("itemPAC") },
            SHO: { val: document.getElementById("statSHO"), item: document.getElementById("itemSHO") },
            PAS: { val: document.getElementById("statPAS"), item: document.getElementById("itemPAS") },
            DRI: { val: document.getElementById("statDRI"), item: document.getElementById("itemDRI") },
            DEF: { val: document.getElementById("statDEF"), item: document.getElementById("itemDEF") },
            PHY: { val: document.getElementById("statPHY"), item: document.getElementById("itemPHY") }
        };

        let selectedPlayer = null;
        let activeStatKey = "PAC";
        let cardStats = { PAC: null, DRI: null, SHO: null, DEF: null, PAS: null, PHY: null };
        let currentRotation = 0;

        const defaultSilhouette = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='32' r='20' fill='%23ffffff'/><path d='M20 90 C20 60, 30 50, 50 50 C70 50, 80 60, 80 90 Z' fill='%23ffffff'/></svg>";

        playerPic.onerror = function() {
            this.src = defaultSilhouette;
        };

        const wheelNumbers = [];
        for (let i = 50; i <= 99; i++) wheelNumbers.push(i);
        const totalSegments = wheelNumbers.length;
        const segmentAngle = 360 / totalSegments;

        const playersDb = [
            { id: "pelé", name: "Pelé", pos: "CAM", isIcon: true },
            { id: "zidane", name: "Zidane", pos: "CM", isIcon: true },
            { id: "mbappe", name: "Mbappé", pos: "ST" },
            { id: "haaland", name: "Haaland", pos: "ST" },
            { id: "bellingham", name: "Bellingham", pos: "CAM" },
            { id: "messi", name: "Messi", pos: "CF" },
            { id: "ronaldo", name: "Ronaldo", pos: "ST" },
            { id: "vini", name: "Vinícius Jr.", pos: "LW" },
            { id: "yamal", name: "Lamine Yamal", pos: "RW" },
            { id: "saka", name: "Saka", pos: "RW" }
        ];

        playerSearch.addEventListener("input", () => {
            const query = playerSearch.value.trim().toLowerCase();
            suggestionsList.innerHTML = "";

            if (!query) {
                suggestionsList.classList.remove("active");
                return;
            }

            const matches = playersDb.filter(p => p.name.toLowerCase().includes(query));

            if (matches.length > 0) {
                matches.forEach(p => {
                    const item = document.createElement("div");
                    item.className = "suggestion-item";
                    item.innerHTML = `<span>${p.name}</span> <strong>${p.pos}</strong>`;
                    item.addEventListener("click", () => selectPlayer(p));
                    suggestionsList.appendChild(item);
                });
                suggestionsList.classList.add("active");
            } else {
                suggestionsList.classList.remove("active");
            }
        });

        function selectPlayer(player) {
            selectedPlayer = player;
            playerSearch.value = player.name;
            suggestionsList.classList.remove("active");

            cardName.innerText = player.name;
            cardPos.innerText = player.pos;

            playerPic.style.opacity = "0";
            playerPic.src = player.img || defaultSilhouette;
            playerPic.onload = () => { playerPic.style.opacity = "1"; };

            openWheelBtn.disabled = false;
            resetCardStats();
            updateCardTier(85);
        }

        function resetCardStats() {
            cardOvr.innerText = "--";
            for (const s in stats) {
                cardStats[s] = null;
                stats[s].val.innerText = "--";
            }
        }

        function updateCardTier(ovr) {
            fcCard.className = "";

            if (selectedPlayer && selectedPlayer.isIcon) {
                fcCard.classList.add("card-icon");
                return;
            }

            if (ovr === null || isNaN(ovr)) {
                fcCard.classList.add("card-blank");
                return;
            }

            if (ovr < 65) {
                fcCard.classList.add("card-bronze");
            } else if (ovr < 75) {
                fcCard.classList.add("card-silver");
            } else if (ovr < 92) {
                fcCard.classList.add("card-gold");
            } else {
                fcCard.classList.add("card-toty");
            }
        }

        function buildNumberedWheel() {
            let svgContent = "";
            const cx = 150, cy = 150, r = 140;

            wheelNumbers.forEach((num, index) => {
                const startAngle = index * segmentAngle;
                const endAngle = (index + 1) * segmentAngle;
                
                const radStart = ((startAngle - 90) * Math.PI) / 180;
                const radEnd = ((endAngle - 90) * Math.PI) / 180;

                const x1 = cx + r * Math.cos(radStart);
                const y1 = cy + r * Math.sin(radStart);
                const x2 = cx + r * Math.cos(radEnd);
                const y2 = cy + r * Math.sin(radEnd);

                const color = index % 2 === 0 ? "#0f2027" : "#203a43";
                
                svgContent += `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z" fill="${color}" stroke="#00ff88" stroke-width="0.5"/>`;

                const textAngle = startAngle + (segmentAngle / 2);
                const textRad = ((textAngle - 90) * Math.PI) / 180;
                const textR = r - 20; 
                const tx = cx + textR * Math.cos(textRad);
                const ty = cy + textR * Math.sin(textRad);

                svgContent += `<text x="${tx}" y="${ty}" fill="#00ff88" font-size="8" font-weight="900" text-anchor="middle" transform="rotate(${textAngle}, ${tx}, ${ty})" dominant-baseline="central">${num}</text>`;
            });

            svgContent += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#00ff88" stroke-width="3"/>`;
            svgContent += `<circle cx="${cx}" cy="${cy}" r="20" fill="#00ff88" stroke="#06090e" stroke-width="3"/>`;

            wheelSvg.innerHTML = svgContent;
        }

        function selectStat(statKey) {
            if (!selectedPlayer) return;

            if (!statKey) {
                const unspunKey = Object.keys(cardStats).find(key => cardStats[key] === null);
                activeStatKey = unspunKey || "PAC";
            } else {
                activeStatKey = statKey;
            }

            modalOverlay.classList.add("visible");
            spinBtn.disabled = false;
            spinBtn.innerText = `SPIN FOR ${activeStatKey}`;
            statusMsg.innerText = `ROLLING ${activeStatKey}`;
        }

        closeBtn.addEventListener("click", () => modalOverlay.classList.remove("visible"));
        openWheelBtn.addEventListener("click", () => selectStat(null));

        Object.keys(stats).forEach(statKey => {
            stats[statKey].item.addEventListener("click", () => selectStat(statKey));
        });

        spinBtn.addEventListener("click", () => {
            if (!activeStatKey) return;

            spinBtn.disabled = true;
            spinBtn.innerText = "SPINNING...";

            const selectedIndex = Math.floor(Math.random() * totalSegments);
            const chosenValue = wheelNumbers[selectedIndex];

            const targetWedgeAngle = (selectedIndex * segmentAngle) + (segmentAngle / 2);
            const correctiveRotation = 360 - targetWedgeAngle; 

            const extraSpins = 1440; 
            currentRotation += extraSpins + correctiveRotation - (currentRotation % 360);

            wheelSvg.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                cardStats[activeStatKey] = chosenValue;
                stats[activeStatKey].val.innerText = chosenValue;

                let sum = 0, count = 0;
                for (const s in cardStats) {
                    if (cardStats[s] !== null) {
                        sum += cardStats[s];
                        count++;
                    }
                }
                const finalOvr = Math.round(sum / count);
                cardOvr.innerText = finalOvr;
                
                updateCardTier(finalOvr);

                spinBtn.innerText = "DONE!";
                statusMsg.innerText = `LANDED ON ${chosenValue}!`;
                
                setTimeout(() => {
                    if (modalOverlay.classList.contains("visible")) closeBtn.click();
                }, 1200);
            }, 4000);
        });

        buildNumberedWheel();
    </script>
</body>
</html>
