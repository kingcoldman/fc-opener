<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Ultimate Team Card Creator (500 Players)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,800;0,900;1,900&display=swap');

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-main-dark: #06090e;
            --bg-card-panel: #111723;
            --accent-green-primary: #00ff88;
            --text-pure-white: #ffffff;
            --text-muted-slate: #5d6d88;
            
            --gold-primary: #e1ba52;
            --gold-light: #fff6d1;
            --gold-dark: #3a2a00;

            --toty-primary: #70eeff;
            --toty-blue: #004ae2;

            --silver-primary: #c0c0c0;
            --bronze-primary: #b87333;
            --icon-primary: #d4af37;
        }

        body {
            background-color: var(--bg-main-dark);
            color: var(--text-pure-white);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .app-title {
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--accent-green-primary);
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            margin-bottom: 20px;
        }

        .search-wrapper {
            position: relative;
            width: 320px;
            margin-bottom: 25px;
            z-index: 50;
        }

        .search-input-field {
            width: 100%;
            padding: 16px;
            font-size: 14px;
            font-weight: 900;
            border-radius: 12px;
            background: var(--bg-card-panel);
            color: white;
            border: 2px solid var(--accent-green-primary);
            outline: none;
            text-transform: uppercase;
        }

        .suggestions-dropdown {
            position: absolute;
            top: 58px;
            left: 0;
            right: 0;
            background: var(--bg-card-panel);
            border: 1px solid var(--accent-green-primary);
            border-radius: 12px;
            max-height: 220px;
            overflow-y: auto;
            display: none;
            z-index: 100;
        }

        .suggestions-dropdown.visible { display: block; }

        .suggestion-row {
            padding: 12px 16px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .suggestion-row:hover {
            background: var(--accent-green-primary);
            color: black;
        }

        .fut-card-base {
            width: 320px;
            height: 480px;
            position: relative;
            clip-path: polygon(15% 0%, 85% 0%, 100% 8%, 100% 75%, 85% 85%, 50% 100%, 15% 85%, 0% 75%, 0% 8%);
            overflow: hidden;
            user-select: none;
        }

        .headshot-frame {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 220px;
            height: 220px;
            z-index: 2;
        }

        .headshot-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .card-bottom-section {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 215px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10px;
        }

        .header-info-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 6px;
        }

        .overall-rating-value { font-size: 36px; font-weight: 900; }
        .position-label-text { font-size: 18px; font-weight: 900; }

        .player-name-ribbon {
            width: 88%;
            text-align: center;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            padding: 4px 0;
            margin-bottom: 10px;
            border-top: 1px solid;
            border-bottom: 1px solid;
        }

        .attribute-matrix-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px 12px;
            width: 84%;
            text-align: center;
        }

        .stat-value-num { font-size: 16px; font-weight: 900; }
        .stat-key-label { font-size: 12px; font-weight: 800; margin-left: 2px; }

        /* Card Tier Styles */
        .tier-gold { background: radial-gradient(circle, var(--gold-light), var(--gold-primary), var(--gold-dark)); }
        .tier-toty { background: radial-gradient(circle, var(--toty-primary), var(--toty-blue), #010619); }
        .tier-silver { background: radial-gradient(circle, #ffffff, #c0c0c0, #1a1a1a); }
        .tier-bronze { background: radial-gradient(circle, #f3d1b5, #b87333, #210d00); }
        .tier-icon { background: radial-gradient(circle, #f7f0dc, var(--icon-primary), #1c180a); }
        .tier-blank { background: #111723; border: 2px solid var(--text-muted-slate); }

        .trigger-wheel-action-btn {
            width: 320px;
            padding: 16px;
            margin-top: 20px;
            background: var(--accent-green-primary);
            color: black;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 900;
            cursor: pointer;
        }

        .trigger-wheel-action-btn:disabled {
            background: #253346;
            color: var(--text-muted-slate);
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1 class="app-title">FC Ultimate Team</h1>

    <div class="search-wrapper">
        <input type="text" id="playerSearch" class="search-input-field" placeholder="Search 500 players..." autocomplete="off">
        <div class="suggestions-dropdown" id="suggestionsList"></div>
    </div>

    <div class="fut-card-base tier-blank" id="fcCard">
        <div class="headshot-frame">
            <img src="" alt="Player Headshot" id="playerPic" style="opacity: 0;">
        </div>

        <div class="card-bottom-section">
            <div class="header-info-row">
                <div class="overall-rating-value" id="cardOvr">--</div>
                <div class="position-label-text" id="cardPos">--</div>
            </div>

            <div class="player-name-ribbon" id="cardName">SELECT PLAYER</div>

            <div class="attribute-matrix-grid">
                <div><span class="stat-value-num" id="statPAC">--</span><span class="stat-key-label">PAC</span></div>
                <div><span class="stat-value-num" id="statSHO">--</span><span class="stat-key-label">SHO</span></div>
                <div><span class="stat-value-num" id="statPAS">--</span><span class="stat-key-label">PAS</span></div>
                <div><span class="stat-value-num" id="statDRI">--</span><span class="stat-key-label">DRI</span></div>
                <div><span class="stat-value-num" id="statDEF">--</span><span class="stat-key-label">DEF</span></div>
                <div><span class="stat-value-num" id="statPHY">--</span><span class="stat-key-label">PHY</span></div>
            </div>
        </div>
    </div>

    <button class="trigger-wheel-action-btn" id="openWheelBtn" disabled>READY TO ROLL</button>

    <script>
        // Starters list containing iconic legend names
        const baseIcons = [
            "Pelé", "Zinedine Zidane", "Ronaldo Nazário", "Johan Cruyff", "Ronaldinho", 
            "Paolo Maldini", "Lev Yashin", "Thierry Henry", "Ruud Gullit", "Mia Hamm"
        ];

        const positions = ["ST", "RW", "LW", "CAM", "CM", "CDM", "CB", "LB", "RB", "GK"];
        const tiers = ["gold", "silver", "bronze", "toty", "icon"];
        const playersDb = [];

        // Build 500 database entries
        for (let i = 1; i <= 500; i++) {
            let pName = i <= 10 ? baseIcons[i - 1] : `Player ${i}`;
            let pTier = i <= 10 ? "icon" : tiers[i % tiers.length];

            playersDb.push({
                id: `p${i}`,
                name: pName,
                pos: positions[i % positions.length],
                tier: pTier,
                img: `https://images.unsplash.com/photo-1508098682722-e99c43a406b2?w=400&auto=format&fit=crop`
            });
        }

        const playerSearch = document.getElementById("playerSearch");
        const suggestionsList = document.getElementById("suggestionsList");
        const fcCard = document.getElementById("fcCard");
        const cardName = document.getElementById("cardName");
        const cardPos = document.getElementById("cardPos");
        const playerPic = document.getElementById("playerPic");
        const openWheelBtn = document.getElementById("openWheelBtn");

        playerSearch.addEventListener("input", () => {
            const query = playerSearch.value.trim().toLowerCase();
            suggestionsList.innerHTML = "";

            if (!query) {
                suggestionsList.classList.remove("visible");
                return;
            }

            const matches = playersDb.filter(p => p.name.toLowerCase().includes(query)).slice(0, 10);

            if (matches.length > 0) {
                matches.forEach(p => {
                    const row = document.createElement("div");
                    row.className = "suggestion-row";
                    row.innerHTML = `<span>${p.name}</span><strong>${p.tier.toUpperCase()}</strong>`;
                    row.addEventListener("click", () => selectPlayer(p));
                    suggestionsList.appendChild(row);
                });
                suggestionsList.classList.add("visible");
            } else {
                suggestionsList.classList.remove("visible");
            }
        });

        function selectPlayer(player) {
            playerSearch.value = player.name;
            suggestionsList.classList.remove("visible");

            cardName.innerText = player.name;
            cardPos.innerText = player.pos;

            playerPic.style.opacity = "0";
            playerPic.src = player.img;
            playerPic.onload = () => { playerPic.style.opacity = "1"; };

            openWheelBtn.disabled = false;
            fcCard.className = `fut-card-base tier-${player.tier}`;
        }
    </script>
</body>
</html>
