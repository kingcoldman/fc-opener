<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Ultimate Team Card Creator & Stat Roller</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,800;0,900;1,900&display=swap');

        /* ==========================================================================
           1. RESET & VARS
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-main-dark: #06090e;
            --bg-card-panel: #111723;
            --accent-green-primary: #00ff88;
            --accent-green-hover: #00e67a;
            --accent-green-dark: #00b359;
            --text-pure-white: #ffffff;
            --text-muted-slate: #5d6d88;
            --border-dark-slate: #2a364f;
            
            --gold-primary: #e1ba52;
            --gold-light: #fff6d1;
            --gold-mid: #a27b1e;
            --gold-dark: #3a2a00;
            --gold-text-dark: #2e2000;
            --gold-text-muted: #4a3600;

            --toty-primary: #70eeff;
            --toty-blue-bright: #004ae2;
            --toty-blue-dark: #031038;
            --toty-black: #010619;

            --silver-primary: #c0c0c0;
            --silver-light: #ffffff;
            --silver-mid: #707070;
            --silver-dark: #1a1a1a;

            --bronze-primary: #b87333;
            --bronze-light: #f3d1b5;
            --bronze-mid: #6e3b12;
            --bronze-dark: #210d00;

            --icon-primary: #d4af37;
            --icon-light: #f7f0dc;
            --icon-accent: #e6c65c;
            --icon-dark: #1c180a;
        }

        body {
            background-color: var(--bg-main-dark);
            color: var(--text-pure-white);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* ==========================================================================
           2. HEADER & SEARCH
           ========================================================================== */
        .app-header-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }

        .app-title {
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-green-primary);
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            text-align: center;
        }

        .app-subtitle {
            font-size: 12px;
            font-weight: 800;
            color: var(--text-muted-slate);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 4px;
        }

        .search-wrapper {
            position: relative;
            width: 320px;
            margin-bottom: 30px;
            z-index: 50;
        }

        .search-input-field {
            width: 100%;
            padding: 16px 20px;
            font-size: 14px;
            font-weight: 900;
            border-radius: 14px;
            background-color: var(--bg-card-panel);
            color: var(--text-pure-white);
            border: 2px solid var(--accent-green-primary);
            outline: none;
            box-shadow: 0 4px 20px rgba(0, 255, 136, 0.25);
            text-transform: uppercase;
            transition: all 0.2s ease-in-out;
        }

        .search-input-field:focus {
            box-shadow: 0 6px 25px rgba(0, 255, 136, 0.4);
            border-color: var(--accent-green-hover);
        }

        .suggestions-dropdown {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            background-color: var(--bg-card-panel);
            border: 1px solid var(--accent-green-primary);
            border-radius: 14px;
            max-height: 250px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.9);
            z-index: 100;
        }

        .suggestions-dropdown.visible { display: block; }

        .suggestion-row {
            padding: 14px 18px;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.15s ease, color 0.15s ease;
        }

        .suggestion-row:hover {
            background-color: var(--accent-green-primary);
            color: var(--bg-main-dark);
        }

        /* ==========================================================================
           3. CARD STRUCTURE
           ========================================================================== */
        .workspace {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 320px;
            gap: 24px;
        }

        .fut-card-base {
            width: 320px;
            height: 480px;
            position: relative;
            clip-path: polygon(15% 0%, 85% 0%, 100% 8%, 100% 75%, 85% 85%, 50% 100%, 15% 85%, 0% 75%, 0% 8%);
            overflow: hidden;
            user-select: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .fut-card-base:hover {
            transform: translateY(-5px);
        }

        .headshot-frame {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 250px;
            height: 250px;
            z-index: 2;
        }

        .headshot-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            transition: opacity 0.3s ease-in-out;
        }

        .card-bottom-section {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 215px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 12px;
        }

        .header-info-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 90%;
            margin-bottom: 6px;
        }

        .overall-rating-value {
            font-size: 38px;
            font-weight: 900;
            line-height: 1;
        }

        .position-label-text {
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .player-name-ribbon {
            width: 88%;
            text-align: center;
            font-size: 19px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 3px 0;
            margin-bottom: 12px;
            border-top: 1px solid;
            border-bottom: 1px solid;
        }

        .attribute-matrix-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px 16px;
            width: 84%;
        }

        .attribute-tile {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: background-color 0.2s ease;
        }

        .attribute-tile:hover {
            background-color: rgba(255, 255, 255, 0.15);
        }

        .stat-value-num {
            font-size: 16px;
            font-weight: 900;
            color: var(--text-pure-white);
        }

        .stat-key-label {
            font-size: 12px;
            font-weight: 800;
        }

        /* ==========================================================================
           4. CARD THEMES
           ========================================================================== */
        .tier-gold {
            background: radial-gradient(circle at 50% 30%, var(--gold-light) 0%, var(--gold-primary) 35%, var(--gold-mid) 70%, var(--gold-dark) 100%);
            border: 3px solid var(--gold-primary);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
        }
        .tier-gold .card-bottom-section { background: linear-gradient(180deg, rgba(74, 54, 0, 0) 0%, rgba(58, 42, 0, 0.85) 30%, rgba(35, 25, 0, 0.95) 100%); }
        .tier-gold .overall-rating-value { color: var(--gold-text-dark); }
        .tier-gold .position-label-text { color: var(--gold-text-muted); }
        .tier-gold .player-name-ribbon { color: #fff4c2; border-color: var(--gold-primary); }
        .tier-gold .stat-key-label { color: var(--gold-primary); }

        .tier-toty {
            background: radial-gradient(circle at 50% 20%, var(--toty-primary) 0%, var(--toty-blue-bright) 40%, var(--toty-blue-dark) 75%, var(--toty-black) 100%);
            border: 3px solid var(--toty-primary);
            box-shadow: 0 15px 35px rgba(0, 74, 226, 0.6);
        }
        .tier-toty .card-bottom-section { background: linear-gradient(180deg, rgba(3, 16, 56, 0) 0%, rgba(3, 16, 56, 0.9) 30%, rgba(1, 6, 25, 0.98) 100%); }
        .tier-toty .overall-rating-value { color: #ffffff; }
        .tier-toty .position-label-text { color: var(--toty-primary); }
        .tier-toty .player-name-ribbon { color: #ffffff; border-color: var(--toty-primary); }
        .tier-toty .stat-key-label { color: var(--toty-primary); }

        .tier-silver {
            background: radial-gradient(circle at 50% 30%, var(--silver-light) 0%, var(--silver-primary) 40%, var(--silver-mid) 75%, var(--silver-dark) 100%);
            border: 3px solid var(--silver-primary);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
        }
        .tier-silver .card-bottom-section { background: linear-gradient(180deg, rgba(40, 40, 40, 0) 0%, rgba(40, 40, 40, 0.85) 30%, rgba(20, 20, 20, 0.95) 100%); }
        .tier-silver .overall-rating-value { color: #1a1a1a; }
        .tier-silver .position-label-text { color: #2b2b2b; }
        .tier-silver .player-name-ribbon { color: #ffffff; border-color: var(--silver-primary); }
        .tier-silver .stat-key-label { color: var(--silver-primary); }

        .tier-bronze {
            background: radial-gradient(circle at 50% 30%, var(--bronze-light) 0%, var(--bronze-primary) 40%, var(--bronze-mid) 75%, var(--bronze-dark) 100%);
            border: 3px solid var(--bronze-primary);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
        }
        .tier-bronze .card-bottom-section { background: linear-gradient(180deg, rgba(43, 18, 0, 0) 0%, rgba(43, 18, 0, 0.85) 30%, rgba(20, 8, 0, 0.95) 100%); }
        .tier-bronze .overall-rating-value { color: #2b1200; }
        .tier-bronze .position-label-text { color: #3e1b00; }
        .tier-bronze .player-name-ribbon { color: var(--bronze-light); border-color: var(--bronze-primary); }
        .tier-bronze .stat-key-label { color: var(--bronze-primary); }

        .tier-icon {
            background: radial-gradient(circle at 50% 25%, var(--icon-light) 0%, var(--icon-primary) 50%, var(--icon-dark) 100%);
            border: 3px solid var(--icon-accent);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.5);
        }
        .tier-icon .card-bottom-section { background: linear-gradient(180deg, rgba(28, 24, 10, 0) 0%, rgba(28, 24, 10, 0.88) 30%, rgba(12, 10, 3, 0.96) 100%); }
        .tier-icon .overall-rating-value { color: #1a1608; }
        .tier-icon .position-label-text { color: #3b3110; }
        .tier-icon .player-name-ribbon { color: #ffffff; border-color: var(--icon-primary); }
        .tier-icon .stat-key-label { color: var(--icon-primary); }

        .tier-blank {
            background: radial-gradient(circle at 50% 30%, #1c2430 0%, #0d121a 100%);
            border: 3px solid var(--border-dark-slate);
        }
        .tier-blank .card-bottom-section { background: rgba(13, 18, 26, 0.95); }
        .tier-blank .overall-rating-value, .tier-blank .position-label-text, .tier-blank .player-name-ribbon, .tier-blank .stat-key-label { color: var(--text-muted-slate); border-color: var(--border-dark-slate); }

        /* ==========================================================================
           5. BUTTONS & MODAL
           ========================================================================== */
        .trigger-wheel-action-btn {
            width: 100%;
            padding: 16px 0;
            background: linear-gradient(135deg, var(--accent-green-primary) 0%, var(--accent-green-dark) 100%);
            color: var(--bg-main-dark);
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.3);
            transition: all 0.2s ease;
        }

        .trigger-wheel-action-btn:disabled {
            background: #253346;
            color: var(--text-muted-slate);
            box-shadow: none;
            cursor: not-allowed;
        }

        .wheel-modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(4, 6, 10, 0.88);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .wheel-modal-overlay.active { opacity: 1; pointer-events: auto; }

        .wheel-dialog-box {
            background: #0f1522;
            border: 2px solid var(--accent-green-primary);
            border-radius: 20px;
            padding: 24px;
            width: min(90vw, 360px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .modal-top-bar { display: flex; width: 100%; justify-content: space-between; align-items: center; }
        .modal-title-text { font-size: 18px; color: var(--accent-green-primary); font-weight: 900; }
        .dismiss-modal-btn { background: #ff4757; color: white; border: none; font-size: 12px; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        .wheel-viewport {
            position: relative;
            width: 270px; height: 270px;
            overflow: hidden;
            border-radius: 50%;
            border: 4px solid var(--accent-green-primary);
        }

        .wheel-svg-element { width: 100%; height: 100%; transform: rotate(0deg); transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1); }
        .wheel-top-pointer {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 15px solid transparent; border-right: 15px solid transparent;
            border-top: 25px solid #ffffff; z-index: 10;
        }

        .execute-spin-btn {
            background: var(--accent-green-primary); color: var(--bg-main-dark); font-size: 16px; font-weight: 900;
            border: none; padding: 14px; border-radius: 12px; cursor: pointer; width: 100%; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="app-header-container">
        <h1 class="app-title">FC Ultimate Team</h1>
        <p class="app-subtitle">Card Creator & Stat Roller</p>
    </div>

    <div class="search-wrapper">
        <input type="text" id="playerSearch" class="search-input-field" placeholder="Search 500 players..." autocomplete="off">
        <div class="suggestions-dropdown" id="suggestionsList"></div>
    </div>

    <div class="workspace">
        <div class="fut-card-base tier-blank" id="fcCard">
            <div class="headshot-frame">
                <img src="" alt="Player Headshot" id="playerPic" style="opacity: 0;">
            </div>

            <div class="card-bottom-section">
                <div class="header-info-row">
                    <div class="overall-rating-value" id="cardOvr">--</div>
                    <div class="position-label-text" id="cardPos">--</div>
                </div>

                <div class="player-name-ribbon" id="cardName">SELECT PLAYER</div>

                <div class="attribute-matrix-grid">
                    <div class="attribute-tile" id="itemPAC"><span class="stat-value-num" id="statPAC">--</span><span class="stat-key-label">PAC</span></div>
                    <div class="attribute-tile" id="itemSHO"><span class="stat-value-num" id="statSHO">--</span><span class="stat-key-label">SHO</span></div>
                    <div class="attribute-tile" id="itemPAS"><span class="stat-value-num" id="statPAS">--</span><span class="stat-key-label">PAS</span></div>
                    <div class="attribute-tile" id="itemDRI"><span class="stat-value-num" id="statDRI">--</span><span class="stat-key-label">DRI</span></div>
                    <div class="attribute-tile" id="itemDEF"><span class="stat-value-num" id="statDEF">--</span><span class="stat-key-label">DEF</span></div>
                    <div class="attribute-tile" id="itemPHY"><span class="stat-value-num" id="statPHY">--</span><span class="stat-key-label">PHY</span></div>
                </div>
            </div>
        </div>

        <button class="trigger-wheel-action-btn" id="openWheelBtn" disabled>🎡 SPIN STAT WHEEL</button>
    </div>

    <div class="wheel-modal-overlay" id="modalOverlay">
        <div class="wheel-dialog-box">
            <div class="modal-top-bar">
                <div class="modal-title-text" id="statusMsg">Select a stat!</div>
                <button class="dismiss-modal-btn" id="closeBtn">✕ Close</button>
            </div>
            <div class="wheel-viewport">
                <div class="wheel-top-pointer"></div>
                <svg class="wheel-svg-element" id="wheelSvg" viewBox="0 0 300 300"></svg>
            </div>
            <button class="execute-spin-btn" id="spinBtn">Spin Wheel</button>
        </div>
    </div>

    <script>
        // Real Player & Legend Database
        const realPlayers = [
            // --- ICONS ---
            { name: "Pelé", pos: "CAM", tier: "icon" },
            { name: "Zinedine Zidane", pos: "CM", tier: "icon" },
            { name: "Ronaldo Nazário", pos: "ST", tier: "icon" },
            { name: "Johan Cruyff", pos: "CF", tier: "icon" },
            { name: "Ronaldinho", pos: "LW", tier: "icon" },
            { name: "Paolo Maldini", pos: "CB", tier: "icon" },
            { name: "Lev Yashin", pos: "GK", tier: "icon" },
            { name: "Thierry Henry", pos: "ST", tier: "icon" },
            { name: "Ruud Gullit", pos: "CF", tier: "icon" },
            { name: "Mia Hamm", pos: "ST", tier: "icon" },
            { name: "Kaká", pos: "CAM", tier: "icon" },
            { name: "David Beckham", pos: "RM", tier: "icon" },
            { name: "Wayne Rooney", pos: "ST", tier: "icon" },
            { name: "Andrea Pirlo", pos: "CM", tier: "icon" },
            { name: "Roberto Carlos", pos: "LB", tier: "icon" },

            // --- CURRENT STARS ---
            { name: "Kylian Mbappé", pos: "ST", tier: "toty" },
            { name: "Erling Haaland", pos: "ST", tier: "gold" },
            { name: "Jude Bellingham", pos: "CAM", tier: "gold" },
            { name: "Lionel Messi", pos: "CF", tier: "gold" },
            { name: "Cristiano Ronaldo", pos: "ST", tier: "gold" },
            { name: "Vinícius Jr.", pos: "LW", tier: "gold" },
            { name: "Lamine Yamal", pos: "RW", tier: "gold" },
            { name: "Bukayo Saka", pos: "RW", tier: "gold" },
            { name: "Kevin De Bruyne", pos: "CM", tier: "gold" },
            { name: "Mohamed Salah", pos: "RW", tier: "gold" },
            { name: "Virgil van Dijk", pos: "CB", tier: "gold" },
            { name: "Rodri", pos: "CDM", tier: "gold" },
            { name: "Harry Kane", pos: "ST", tier: "gold" },
            { name: "Antoine Griezmann", pos: "ST", tier: "gold" },
            { name: "Pedri", pos: "CM", tier: "gold" },
            { name: "Cole Palmer", pos: "RW", tier: "gold" },
            { name: "Florian Wirtz", pos: "CAM", tier: "gold" },
            { name: "Jamal Musiala", pos: "CAM", tier: "gold" },
            { name: "Federico Valverde", pos: "CM", tier: "gold" },
            { name: "Lautaro Martínez", pos: "ST", tier: "gold" }
        ];

        const positions = ["ST", "RW", "LW", "CAM", "CM", "CDM", "CB", "LB", "RB", "GK"];
        const tiers = ["gold", "silver", "bronze", "toty", "icon"];
        const playersDb = realPlayers.map((p, idx) => ({
            id: `p${idx + 1}`,
            name: p.name,
            pos: p.pos,
            tier: p.tier,
            img: "https://images.unsplash.com/photo-1508098682722-e99c43a406b2?w=400&auto=format&fit=crop"
        }));

        // Fill up database to 500 total entries
        for (let i = playersDb.length + 1; i <= 500; i++) {
            playersDb.push({
                id: `p${i}`,
                name: `Player ${i}`,
                pos: positions[i % positions.length],
                tier: tiers[i % tiers.length],
                img: `https://images.unsplash.com/photo-1508098682722-e99c43a406b2?w=400&auto=format&fit=crop`
            });
        }

        // DOM References
        const playerSearch = document.getElementById("playerSearch");
        const suggestionsList = document.getElementById("suggestionsList");
        const spinBtn = document.getElementById("spinBtn");
        const closeBtn = document.getElementById("closeBtn");
        const openWheelBtn = document.getElementById("openWheelBtn");
        const wheelSvg = document.getElementById("wheelSvg");
        const modalOverlay = document.getElementById("modalOverlay");
        const statusMsg = document.getElementById("statusMsg");

        const fcCard = document.getElementById("fcCard");
        const cardName = document.getElementById("cardName");
        const cardOvr = document.getElementById("cardOvr");
        const cardPos = document.getElementById("cardPos");
        const playerPic = document.getElementById("playerPic");

        const statsMap = {
            PAC: { val: document.getElementById("statPAC"), item: document.getElementById("itemPAC") },
            SHO: { val: document.getElementById("statSHO"), item: document.getElementById("itemSHO") },
            PAS: { val: document.getElementById("statPAS"), item: document.getElementById("itemPAS") },
            DRI: { val: document.getElementById("statDRI"), item: document.getElementById("itemDRI") },
            DEF: { val: document.getElementById("statDEF"), item: document.getElementById("itemDEF") },
            PHY: { val: document.getElementById("statPHY"), item: document.getElementById("itemPHY") }
        };

        // State Tracking
        let selectedPlayer = null;
        let activeStatKey = "PAC";
        let cardStats = { PAC: null, DRI: null, SHO: null, DEF: null, PAS: null, PHY: null };
        let currentRotation = 0;

        const fallbackSvg = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='32' r='20' fill='%23ffffff'/><path d='M20 90 C20 60, 30 50, 50 50 C70 50, 80 60, 80 90 Z' fill='%23ffffff'/></svg>";
        playerPic.onerror = function() { this.src = fallbackSvg; };

        const wheelNumbers = Array.from({ length: 50 }, (_, i) => i + 50);
        const totalSegments = wheelNumbers.length;
        const segmentAngle = 360 / totalSegments;

        // Search & Selection Handler
        playerSearch.addEventListener("input", () => {
            const query = playerSearch.value.trim().toLowerCase();
            suggestionsList.innerHTML = "";

            if (!query) { 
                suggestionsList.classList.remove("visible"); 
                return; 
            }

            const matches = playersDb.filter(p => p.name.toLowerCase().includes(query)).slice(0, 12);

            if (matches.length > 0) {
                matches.forEach(p => {
                    const row = document.createElement("div");
                    row.className = "suggestion-row";
                    row.innerHTML = `<span>${p.name}</span><strong>${p.tier.toUpperCase()}</strong>`;
                    row.addEventListener("click", () => selectPlayer(p));
                    suggestionsList.appendChild(row);
                });
                suggestionsList.classList.add("visible");
            } else {
                suggestionsList.classList.remove("visible");
            }
        });

        function selectPlayer(player) {
            selectedPlayer = player;
            playerSearch.value = player.name;
            suggestionsList.classList.remove("visible");

            cardName.innerText = player.name;
            cardPos.innerText = player.pos;

            playerPic.style.opacity = "0";
            playerPic.src = player.img || fallbackSvg;
            playerPic.onload = () => { playerPic.style.opacity = "1"; };

            openWheelBtn.disabled = false;
            resetCardStats();
            fcCard.className = `fut-card-base tier-${player.tier}`;
        }

        function resetCardStats() {
            cardOvr.innerText = "--";
            for (const key in statsMap) {
                cardStats[key] = null;
                statsMap[key].val.innerText = "--";
            }
        }

        // Generate SVG Wheel Slices
        function buildWheel() {
            let svgMarkup = "";
            const cx = 150, cy = 150, r = 140;

            wheelNumbers.forEach((num, idx) => {
                const startAngle = idx * segmentAngle;
                const endAngle = (idx + 1) * segmentAngle;
                
                const radStart = ((startAngle - 90) * Math.PI) / 180;
                const radEnd = ((endAngle - 90) * Math.PI) / 180;

                const x1 = cx + r * Math.cos(radStart);
                const y1 = cy + r * Math.sin(radStart);
                const x2 = cx + r * Math.cos(radEnd);
                const y2 = cy + r * Math.sin(radEnd);

                const color = idx % 2 === 0 ? "#0f2027" : "#203a43";
                
                svgMarkup += `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z" fill="${color}" stroke="#00ff88" stroke-width="0.5"/>`;

                const textAngle = startAngle + (segmentAngle / 2);
                const textRad = ((textAngle - 90) * Math.PI) / 180;
                const tx = cx + (r - 20) * Math.cos(textRad);
                const ty = cy + (r - 20) * Math.sin(textRad);

                svgMarkup += `<text x="${tx}" y="${ty}" fill="#00ff88" font-size="8" font-weight="900" text-anchor="middle" transform="rotate(${textAngle}, ${tx}, ${ty})" dominant-baseline="central">${num}</text>`;
            });

            svgMarkup += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#00ff88" stroke-width="3"/>`;
            svgMarkup += `<circle cx="${cx}" cy="${cy}" r="20" fill="#00ff88" stroke="#06090e" stroke-width="3"/>`;

            wheelSvg.innerHTML = svgMarkup;
        }

        // Wheel Control Logic
        function openModalForStat(statKey) {
            if (!selectedPlayer) return;

            if (!statKey) {
                const unspunKey = Object.keys(cardStats).find(k => cardStats[k] === null);
                activeStatKey = unspunKey || "PAC";
            } else {
                activeStatKey = statKey;
            }

            modalOverlay.classList.add("active");
            spinBtn.disabled = false;
            spinBtn.innerText = `SPIN FOR ${activeStatKey}`;
            statusMsg.innerText = `ROLLING ${activeStatKey}`;
        }

        closeBtn.addEventListener("click", () => modalOverlay.classList.remove("active"));
        openWheelBtn.addEventListener("click", () => openModalForStat(null));

        Object.keys(statsMap).forEach(key => {
            statsMap[key].item.addEventListener("click", () => openModalForStat(key));
        });

        spinBtn.addEventListener("click", () => {
            if (!activeStatKey) return;

            spinBtn.disabled = true;
            spinBtn.innerText = "SPINNING...";

            const selectedIndex = Math.floor(Math.random() * totalSegments);
            const chosenValue = wheelNumbers[selectedIndex];

            const targetWedgeAngle = (selectedIndex * segmentAngle) + (segmentAngle / 2);
            const correctiveRotation = 360 - targetWedgeAngle; 

            currentRotation += 1440 + correctiveRotation - (currentRotation % 360);
            wheelSvg.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                cardStats[activeStatKey] = chosenValue;
                statsMap[activeStatKey].val.innerText = chosenValue;

                let sum = 0, count = 0;
                for (const s in cardStats) {
                    if (cardStats[s] !== null) {
                        sum += cardStats[s];
                        count++;
                    }
                }
                cardOvr.innerText = Math.round(sum / count);

                spinBtn.innerText = "DONE!";
                statusMsg.innerText = `LANDED ON ${chosenValue}!`;
                
                setTimeout(() => {
                    if (modalOverlay.classList.contains("active")) closeBtn.click();
                }, 1200);
            }, 4000);
        });

        buildWheel();
    </script>
</body>
</html>
