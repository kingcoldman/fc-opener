<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Ultimate Team Card Creator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #06090e;
            color: #ffffff;
            font-family: 'Arial Black', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 30px 15px;
            overflow-x: hidden;
        }

        h1 {
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
            text-align: center;
        }

        /* SEARCH BAR STYLES */
        .search-container {
            position: relative;
            width: 320px;
            margin-bottom: 25px;
            z-index: 20;
        }

        .search-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 15px;
            font-weight: 900;
            border-radius: 12px;
            background: #111723;
            color: #ffffff;
            border: 2px solid #00ff88;
            outline: none;
            box-shadow: 0 4px 20px rgba(0, 255, 136, 0.2);
            text-transform: uppercase;
        }

        .search-input::placeholder {
            color: #5d6d88;
            font-weight: 700;
        }

        .suggestions-list {
            position: absolute;
            top: 55px;
            left: 0;
            right: 0;
            background: #111723;
            border: 1px solid #00ff88;
            border-radius: 12px;
            max-height: 220px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            z-index: 30;
        }

        .suggestions-list.active {
            display: block;
        }

        .suggestion-item {
            padding: 12px 16px;
            font-size: 14px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .suggestion-item:hover {
            background: #00ff88;
            color: #06090e;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 320px;
            gap: 20px;
            position: relative;
        }

        /* ---------------------------------------------------- */
        /* EA FC CARD SHAPE & BACKDROP VECTOR TIERS             */
        /* ---------------------------------------------------- */
        .fc-card {
            width: 310px;
            height: 470px;
            position: relative;
            font-family: 'Arial Black', sans-serif;
            text-transform: uppercase;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            clip-path: polygon(16% 0%, 84% 0%, 100% 11%, 100% 77%, 50% 100%, 0% 77%, 0% 11%);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            user-select: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        /* BLANK DEFAULT STATE */
        .card-blank {
            background: linear-gradient(135deg, #1c2430 0%, #0d121a 100%);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            color: #5d6d88;
        }

        /* 50-69 BRONZE */
        .card-bronze {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="310" height="470"><defs><linearGradient id="b" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="%23a86942"/><stop offset="50%" stop-color="%235e381e"/><stop offset="100%" stop-color="%23301a0c"/></linearGradient></defs><rect width="100%" height="100%" fill="url(%23b)"/><path d="M0 0l310 470M310 0L0 470" stroke="%23ffffff" stroke-opacity="0.05" stroke-width="20"/></svg>');
            color: #fcebe1;
        }

        /* 70-79 SILVER */
        .card-silver {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="310" height="470"><defs><linearGradient id="s" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="%23e0e6ed"/><stop offset="50%" stop-color="%2395a5a6"/><stop offset="100%" stop-color="%2334495e"/></linearGradient></defs><rect width="100%" height="100%" fill="url(%23s)"/><path d="M0 0l310 470M310 0L0 470" stroke="%23ffffff" stroke-opacity="0.1" stroke-width="20"/></svg>');
            color: #1a252f;
        }

        /* 80-89 GOLD */
        .card-gold {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="310" height="470"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="%23ffeaa7"/><stop offset="50%" stop-color="%23d4af37"/><stop offset="100%" stop-color="%237a5c00"/></linearGradient></defs><rect width="100%" height="100%" fill="url(%23g)"/><path d="M0 0l310 470M310 0L0 470" stroke="%23ffffff" stroke-opacity="0.15" stroke-width="20"/></svg>');
            color: #2b1f00;
        }

        /* 90-94 TOTY HONORABLE MENTION */
        .card-toty-hm {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="310" height="470"><defs><linearGradient id="hm" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="%2300d2ff"/><stop offset="50%" stop-color="%230052d4"/><stop offset="100%" stop-color="%234364f7"/></linearGradient></defs><rect width="100%" height="100%" fill="url(%23hm)"/><path d="M0 0l310 470M310 0L0 470" stroke="%23ffffff" stroke-opacity="0.25" stroke-width="20"/></svg>');
            color: #ffffff;
            text-shadow: 0 0 8px rgba(0, 210, 255, 0.8);
        }

        /* 95-99 TOTY */
        .card-toty {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="310" height="470"><defs><linearGradient id="t" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="%231a2a6c"/><stop offset="50%" stop-color="%23b21f1f"/><stop offset="100%" stop-color="%23fdbb2d"/></linearGradient></defs><rect width="100%" height="100%" fill="url(%23t)"/><path d="M0 0l310 470M310 0L0 470" stroke="%23ffd700" stroke-opacity="0.3" stroke-width="20"/></svg>');
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        /* CARD ELEMENTS */
        .card-badge-column {
            position: absolute;
            top: 40px;
            left: 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 4;
            width: 55px;
        }

        .overall-rating {
            font-size: 46px;
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -1px;
        }

        .position {
            font-size: 15px;
            font-weight: 900;
            margin-top: 4px;
            border-bottom: 2px solid currentColor;
            padding-bottom: 2px;
            width: 100%;
            text-align: center;
        }

        .badge-placeholder {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 900;
            border: 1.5px solid currentColor;
            background: rgba(0, 0, 0, 0.2);
        }

        .player-img-container {
            position: absolute;
            width: 260px;
            height: 260px;
            bottom: 150px;
            right: -25px;
            z-index: 3;
            pointer-events: none;
        }

        .player-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0px 10px 15px rgba(0, 0, 0, 0.6));
            transition: opacity 0.3s ease;
        }

        .player-name {
            position: absolute;
            width: 84%;
            left: 8%;
            text-align: center;
            top: 275px;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 0.5px;
            z-index: 4;
            padding: 4px 0;
            border-bottom: 2px solid currentColor;
        }

        .stats-grid {
            position: absolute;
            bottom: 45px;
            left: 35px;
            right: 35px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            z-index: 4;
        }

        .stats-col {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-item {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 3px 6px;
            border-radius: 6px;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        .stat-item:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }

        .stat-val {
            font-weight: 900;
            font-size: 19px;
            width: 25px;
            text-align: right;
        }

        .stat-lbl {
            font-weight: 700;
            font-size: 14px;
            opacity: 0.9;
            width: 30px;
            text-align: left;
        }

        .stat-divider {
            width: 2px;
            height: 75px;
            margin: 0 10px;
            background: currentColor;
            opacity: 0.3;
        }

        .spin-wheel-trigger-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00ff88 0%, #00b359 100%);
            color: #06090e;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 1px;
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.4);
            transition: all 0.2s ease;
        }

        .spin-wheel-trigger-btn:disabled {
            background: #253346;
            color: #5d6d88;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* ---------------------------------------------------- */
        /* WHEEL MODAL OVERLAY                                  */
        /* ---------------------------------------------------- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(4, 6, 10, 0.88);
            backdrop-filter: blur(10px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .control-panel {
            background: #0f1522;
            border: 2px solid #00ff88;
            border-radius: 24px;
            padding: 25px;
            width: min(92vw, 420px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.9);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }

        .modal-overlay.visible .control-panel {
            transform: scale(1);
        }

        .wheel-header {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
        }

        .status-msg {
            font-size: 20px;
            color: #00ff88;
            font-weight: 900;
        }

        .close-btn {
            background: #ff4757;
            color: white;
            border: none;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .wheel-box {
            position: relative;
            width: min(72vw, 320px); 
            height: min(72vw, 320px);
            overflow: hidden;
            border-radius: 50%;
            border: 4px solid #00ff88;
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.3);
        }

        .wheel-svg {
            width: 100%;
            height: 100%;
            transform: rotate(0deg);
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
        }

        .wheel-pointer {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 30px solid #ffffff;
            z-index: 10;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.8));
        }

        .spin-btn {
            background: #00ff88;
            color: #06090e;
            font-size: 18px;
            font-weight: 900;
            border: none;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.4);
        }

        .spin-btn:disabled {
            background: #2d3748;
            color: #718096;
            cursor: not-allowed;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <h1>FC Ultimate Team</h1>

    <div class="search-container">
        <input type="text" id="playerSearch" class="search-input" placeholder="Type player name..." autocomplete="off">
        <div class="suggestions-list" id="suggestionsList"></div>
    </div>

    <div class="game-container">
        
        <div class="fc-card card-blank" id="fcCard">
            <div class="player-img-container">
                <img src="" alt="Player" class="player-img" id="playerPic" style="opacity: 0;">
            </div>

            <div class="card-badge-column">
                <div class="overall-rating" id="cardOvr">--</div>
                <div class="position" id="cardPos">--</div>
                <div class="badge-placeholder">NAT</div>
                <div class="badge-placeholder">CLUB</div>
            </div>

            <div class="player-name" id="cardName">SELECT PLAYER</div>
            
            <div class="stats-grid">
                <div class="stats-col">
                    <div class="stat-item" id="itemPAC"><span class="stat-val" id="statPAC">--</span> <span class="stat-lbl">PAC</span></div>
                    <div class="stat-item" id="itemSHO"><span class="stat-val" id="statSHO">--</span> <span class="stat-lbl">SHO</span></div>
                    <div class="stat-item" id="itemPAS"><span class="stat-val" id="statPAS">--</span> <span class="stat-lbl">PAS</span></div>
                </div>

                <div class="stat-divider"></div>

                <div class="stats-col">
                    <div class="stat-item" id="itemDRI"><span class="stat-val" id="statDRI">--</span> <span class="stat-lbl">DRI</span></div>
                    <div class="stat-item" id="itemDEF"><span class="stat-val" id="statDEF">--</span> <span class="stat-lbl">DEF</span></div>
                    <div class="stat-item" id="itemPHY"><span class="stat-val" id="statPHY">--</span> <span class="stat-lbl">PHY</span></div>
                </div>
            </div>
        </div>

        <button class="spin-wheel-trigger-btn" id="openWheelBtn" disabled>🎡 SPIN STAT WHEEL</button>

    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="control-panel">
            <div class="wheel-header">
                <div class="status-msg" id="statusMsg">Select a stat!</div>
                <button class="close-btn" id="closeBtn">✕ Close</button>
            </div>
            <div class="wheel-box">
                <div class="wheel-pointer"></div>
                <svg class="wheel-svg" id="wheelSvg" viewBox="0 0 300 300"></svg>
            </div>
            <button class="spin-btn" id="spinBtn">Spin Wheel</button>
        </div>
    </div>

    <script>
        // DOM Elements
        const playerSearch = document.getElementById("playerSearch");
        const suggestionsList = document.getElementById("suggestionsList");
        const spinBtn = document.getElementById("spinBtn");
        const closeBtn = document.getElementById("closeBtn");
        const openWheelBtn = document.getElementById("openWheelBtn");
        const wheelSvg = document.getElementById("wheelSvg");
        const modalOverlay = document.getElementById("modalOverlay");
        const statusMsg = document.getElementById("statusMsg");

        const fcCard = document.getElementById("fcCard");
        const cardName = document.getElementById("cardName");
        const cardOvr = document.getElementById("cardOvr");
        const cardPos = document.getElementById("cardPos");
        const playerPic = document.getElementById("playerPic");

        const stats = {
            PAC: { val: document.getElementById("statPAC"), item: document.getElementById("itemPAC") },
            SHO: { val: document.getElementById("statSHO"), item: document.getElementById("itemSHO") },
            PAS: { val: document.getElementById("statPAS"), item: document.getElementById("itemPAS") },
            DRI: { val: document.getElementById("statDRI"), item: document.getElementById("itemDRI") },
            DEF: { val: document.getElementById("statDEF"), item: document.getElementById("itemDEF") },
            PHY: { val: document.getElementById("statPHY"), item: document.getElementById("itemPHY") }
        };

        let selectedPlayer = null;
        let activeStatKey = "PAC";
        let cardStats = { PAC: null, DRI: null, SHO: null, DEF: null, PAS: null, PHY: null };
        let currentRotation = 0;

        // Numbers on Wheel (50-99)
        const wheelNumbers = [];
        for (let i = 50; i <= 99; i++) {
            wheelNumbers.push(i);
        }
        const totalSegments = wheelNumbers.length;
        const segmentAngle = 360 / totalSegments;

        // Verified Player Database with Public Wikimedia PNG Cutouts
        const playersDb = [
            { id: "mbappe", name: "Kylian Mbappé", pos: "ST", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/57/Kylian_Mbapp%C3%A9_Dec_2023_%28cropped%29.png/250px-Kylian_Mbapp%C3%A9_Dec_2023_%28cropped%29.png" },
            { id: "haaland", name: "Erling Haaland", pos: "ST", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/Erling_Haaland_2023_%28cropped%29.png/250px-Erling_Haaland_2023_%28cropped%29.png" },
            { id: "bellingham", name: "Jude Bellingham", pos: "CAM", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Jude_Bellingham_2024_%28cropped%29.png/250px-Jude_Bellingham_2024_%28cropped%29.png" },
            { id: "messi", name: "Lionel Messi", pos: "CF", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Lionel-Messi-Argentina-2022-FIFA-World-Cup_%28cropped%29.png/250px-Lionel-Messi-Argentina-2022-FIFA-World-Cup_%28cropped%29.png" },
            { id: "ronaldo", name: "Cristiano Ronaldo", pos: "ST", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d7/Cristiano_Ronaldo_playing_for_Al_Nassr_FC_sign_against_Al-Fateh_FC_on_3_February_2023_%28cropped%29.png/250px-Cristiano_Ronaldo_playing_for_Al_Nassr_FC_sign_against_Al-Fateh_FC_on_3_February_2023_%28cropped%29.png" },
            { id: "vini", name: "Vinícius Jr.", pos: "LW", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Vinicius_Jr_2024_%28cropped%29.png/250px-Vinicius_Jr_2024_%28cropped%29.png" },
            { id: "yamal", name: "Lamine Yamal", pos: "RW", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Lamine_Yamal_2024_%28cropped%29.png/250px-Lamine_Yamal_2024_%28cropped%29.png" },
            { id: "saka", name: "Bukayo Saka", pos: "RW", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Bukayo_Saka_2024_%28cropped%29.png/250px-Bukayo_Saka_2024_%28cropped%29.png" },
            { id: "palmer", name: "Cole Palmer", pos: "CAM", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a0/Cole_Palmer_2024_%28cropped%29.png/250px-Cole_Palmer_2024_%28cropped%29.png" },
            { id: "musiala", name: "Jamal Musiala", pos: "CAM", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/98/Jamal_Musiala_2024_%28cropped%29.png/250px-Jamal_Musiala_2024_%28cropped%29.png" },
            { id: "wirtz", name: "Florian Wirtz", pos: "CAM", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Florian_Wirtz_2024_%28cropped%29.png/250px-Florian_Wirtz_2024_%28cropped%29.png" },
            { id: "kane", name: "Harry Kane", pos: "ST", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Harry_Kane_2024_%28cropped%29.png/250px-Harry_Kane_2024_%28cropped%29.png" },
            { id: "debruyne", name: "Kevin De Bruyne", pos: "CM", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/Kevin_De_Bruyne_2024_%28cropped%29.png/250px-Kevin_De_Bruyne_2024_%28cropped%29.png" },
            { id: "rodri", name: "Rodri", pos: "CDM", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Rodrigo_Hern%C3%A1ndez_Cascante_2024_%28cropped%29.png/250px-Rodrigo_Hern%C3%A1ndez_Cascante_2024_%28cropped%29.png" },
            { id: "salah", name: "Mohamed Salah", pos: "RW", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Mohamed_Salah_2023_%28cropped%29.png/250px-Mohamed_Salah_2023_%28cropped%29.png" },
            { id: "lewandowski", name: "Robert Lewandowski", pos: "ST", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/03/Robert_Lewandowski_2024_%28cropped%29.png/250px-Robert_Lewandowski_2024_%28cropped%29.png" }
        ];

        // Search Autocomplete
        playerSearch.addEventListener("input", () => {
            const query = playerSearch.value.trim().toLowerCase();
            suggestionsList.innerHTML = "";

            if (!query) {
                suggestionsList.classList.remove("active");
                return;
            }

            const matches = playersDb.filter(p => p.name.toLowerCase().includes(query));

            if (matches.length > 0) {
                matches.forEach(p => {
                    const item = document.createElement("div");
                    item.className = "suggestion-item";
                    item.innerHTML = `<span>${p.name}</span> <strong>${p.pos}</strong>`;
                    item.addEventListener("click", () => selectPlayer(p));
                    suggestionsList.appendChild(item);
                });
                suggestionsList.classList.add("active");
            } else {
                suggestionsList.classList.remove("active");
            }
        });

        function selectPlayer(player) {
            selectedPlayer = player;
            playerSearch.value = player.name;
            suggestionsList.classList.remove("active");

            cardName.innerText = player.name;
            cardPos.innerText = player.pos;

            playerPic.style.opacity = "0";
            playerPic.src = player.img;
            playerPic.onload = () => { playerPic.style.opacity = "1"; };

            openWheelBtn.disabled = false;
            resetCardStats();
            updateCardTier(80);
        }

        function resetCardStats() {
            cardOvr.innerText = "--";
            for (const s in stats) {
                cardStats[s] = null;
                stats[s].val.innerText = "--";
            }
        }

        function updateCardTier(ovr) {
            fcCard.className = "fc-card";

            if (ovr === null || isNaN(ovr)) {
                fcCard.classList.add("card-blank");
                return;
            }

            if (ovr >= 50 && ovr <= 69) {
                fcCard.classList.add("card-bronze");
            } else if (ovr >= 70 && ovr <= 79) {
                fcCard.classList.add("card-silver");
            } else if (ovr >= 80 && ovr <= 89) {
                fcCard.classList.add("card-gold");
            } else if (ovr >= 90 && ovr <= 94) {
                fcCard.classList.add("card-toty-hm");
            } else if (ovr >= 95) {
                fcCard.classList.add("card-toty");
            }
        }

        function buildNumberedWheel() {
            let svgContent = "";
            const cx = 150, cy = 150, r = 140;

            wheelNumbers.forEach((num, index) => {
                const startAngle = index * segmentAngle;
                const endAngle = (index + 1) * segmentAngle;
                
                const radStart = ((startAngle - 90) * Math.PI) / 180;
                const radEnd = ((endAngle - 90) * Math.PI) / 180;

                const x1 = cx + r * Math.cos(radStart);
                const y1 = cy + r * Math.sin(radStart);
                const x2 = cx + r * Math.cos(radEnd);
                const y2 = cy + r * Math.sin(radEnd);

                const color = index % 2 === 0 ? "#0f2027" : "#203a43";
                
                svgContent += `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z" fill="${color}" stroke="#00ff88" stroke-width="0.5"/>`;

                const textAngle = startAngle + (segmentAngle / 2);
                const textRad = ((textAngle - 90) * Math.PI) / 180;
                const textR = r - 22; 
                const tx = cx + textR * Math.cos(textRad);
                const ty = cy + textR * Math.sin(textRad);

                svgContent += `<text x="${tx}" y="${ty}" fill="#00ff88" font-size="8" font-weight="900" text-anchor="middle" transform="rotate(${textAngle}, ${tx}, ${ty})" dominant-baseline="central">${num}</text>`;
            });

            svgContent += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#00ff88" stroke-width="3"/>`;
            svgContent += `<circle cx="${cx}" cy="${cy}" r="20" fill="#00ff88" stroke="#06090e" stroke-width="3"/>`;

            wheelSvg.innerHTML = svgContent;
        }

        function selectStat(statKey) {
            if (!selectedPlayer) return;

            if (!statKey) {
                const unspunKey = Object.keys(cardStats).find(key => cardStats[key] === null);
                activeStatKey = unspunKey || "PAC";
            } else {
                activeStatKey = statKey;
            }

            modalOverlay.classList.add("visible");
            spinBtn.disabled = false;
            spinBtn.innerText = `SPIN FOR ${activeStatKey}`;
            statusMsg.innerText = `ROLLING ${activeStatKey}`;
        }

        closeBtn.addEventListener("click", () => modalOverlay.classList.remove("visible"));
        openWheelBtn.addEventListener("click", () => selectStat(null));

        Object.keys(stats).forEach(statKey => {
            stats[statKey].item.addEventListener("click", () => selectStat(statKey));
        });

        spinBtn.addEventListener("click", () => {
            if (!activeStatKey) return;

            spinBtn.disabled = true;
            spinBtn.innerText = "SPINNING...";

            const selectedIndex = Math.floor(Math.random() * totalSegments);
            const chosenValue = wheelNumbers[selectedIndex];

            const targetWedgeAngle = (selectedIndex * segmentAngle) + (segmentAngle / 2);
            const correctiveRotation = 360 - targetWedgeAngle; 

            const extraSpins = 1440; 
            currentRotation += extraSpins + correctiveRotation - (currentRotation % 360);

            wheelSvg.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                cardStats[activeStatKey] = chosenValue;
                stats[activeStatKey].val.innerText = chosenValue;

                let sum = 0, count = 0;
                for (const s in cardStats) {
                    if (cardStats[s] !== null) {
                        sum += cardStats[s];
                        count++;
                    }
                }
                const finalOvr = Math.round(sum / count);
                cardOvr.innerText = finalOvr;
                
                updateCardTier(finalOvr);

                spinBtn.innerText = "DONE!";
                statusMsg.innerText = `LANDED ON ${chosenValue}!`;
                
                setTimeout(() => {
                    if (modalOverlay.classList.contains("visible")) closeBtn.click();
                }, 1200);
            }, 4000);
        });

        buildNumberedWheel();
    </script>
</body>
</html>
