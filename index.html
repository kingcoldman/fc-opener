<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Ultimate Team Card Creator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,800;0,900;1,900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #080c14;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 30px 15px;
            overflow-x: hidden;
        }

        h1 {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
            text-align: center;
        }

        /* SEARCH CONTAINER */
        .search-container {
            position: relative;
            width: 320px;
            margin-bottom: 25px;
            z-index: 20;
        }

        .search-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 14px;
            font-weight: 900;
            border-radius: 12px;
            background: #111723;
            color: #ffffff;
            border: 2px solid #00ff88;
            outline: none;
            box-shadow: 0 4px 20px rgba(0, 255, 136, 0.2);
            text-transform: uppercase;
        }

        .suggestions-list {
            position: absolute;
            top: 55px;
            left: 0;
            right: 0;
            background: #111723;
            border: 1px solid #00ff88;
            border-radius: 12px;
            max-height: 220px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            z-index: 30;
        }

        .suggestions-list.active {
            display: block;
        }

        .suggestion-item {
            padding: 12px 16px;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .suggestion-item:hover {
            background: #00ff88;
            color: #06090e;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 320px;
            gap: 20px;
        }

        /* DEFAULT BLANK CARD */
        .card-blank {
            width: 320px;
            height: 480px;
            position: relative;
            clip-path: polygon(15% 0%, 85% 0%, 100% 8%, 100% 75%, 85% 85%, 50% 100%, 15% 85%, 0% 75%, 0% 8%);
            background: radial-gradient(circle at 50% 30%, #1c2430 0%, #0d121a 100%);
            color: #5d6d88;
            border: 3px solid #2a364f;
            overflow: hidden;
            user-select: none;
        }
        .card-blank .player-pic-wrapper {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 260px;
            height: 260px;
            z-index: 1;
        }
        .card-blank .player-pic-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .card-blank .bottom-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 210px;
            background: rgba(13, 18, 26, 0.95);
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10px;
        }
        .card-blank .main-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 90%;
            margin-bottom: 5px;
        }
        .card-blank .ovr-badge { font-size: 38px; font-weight: 900; color: #5d6d88; }
        .card-blank .pos-badge { font-size: 18px; font-weight: 900; color: #5d6d88; }
        .card-blank .name-banner {
            width: 88%;
            text-align: center;
            font-size: 20px;
            font-weight: 900;
            color: #5d6d88;
            border-top: 1px solid #2a364f;
            border-bottom: 1px solid #2a364f;
            padding: 3px 0;
            margin-bottom: 12px;
        }
        .card-blank .stats-matrix {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px 15px;
            width: 82%;
        }
        .card-blank .stat-box { display: flex; align-items: center; justify-content: center; gap: 4px; }
        .card-blank .stat-num { font-size: 16px; font-weight: 900; color: #5d6d88; }
        .card-blank .stat-label { font-size: 12px; font-weight: 800; color: #5d6d88; }

        /* MODAL OVERLAY & WHEEL */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(4, 6, 10, 0.88);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .control-panel {
            background: #0f1522;
            border: 2px solid #00ff88;
            border-radius: 20px;
            padding: 20px;
            width: min(90vw, 380px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .wheel-header {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
        }

        .status-msg {
            font-size: 18px;
            color: #00ff88;
            font-weight: 900;
        }

        .close-btn {
            background: #ff4757;
            color: white;
            border: none;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .wheel-box {
            position: relative;
            width: 280px; 
            height: 280px;
            overflow: hidden;
            border-radius: 50%;
            border: 4px solid #00ff88;
        }

        .wheel-svg {
            width: 100%;
            height: 100%;
            transform: rotate(0deg);
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
        }

        .wheel-pointer {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #ffffff;
            z-index: 10;
        }

        .spin-btn {
            background: #00ff88;
            color: #06090e;
            font-size: 16px;
            font-weight: 900;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h1>FC Ultimate Team</h1>

    <div class="search-container">
        <input type="text" id="playerSearch" class="search-input" placeholder="Search player name..." autocomplete="off">
        <div class="suggestions-list" id="suggestionsList"></div>
    </div>

    <div class="game-container">
        <div class="card-blank" id="fcCard">
            <div class="player-pic-wrapper">
                <img src="" alt="Player Headshot" id="playerPic" style="opacity: 0;">
            </div>

            <div class="bottom-panel">
                <div class="main-header">
                    <div class="ovr-badge" id="cardOvr">--</div>
                    <div class="pos-badge" id="cardPos">--</div>
                </div>

                <div class="name-banner" id="cardName">SELECT PLAYER</div>

                <div class="stats-matrix">
                    <div class="stat-box" id="itemPAC"><span class="stat-num" id="statPAC">--</span><span class="stat-label">PAC</span></div>
                    <div class="stat-box" id="itemSHO"><span class="stat-num" id="statSHO">--</span><span class="stat-label">SHO</span></div>
                    <div class="stat-box" id="itemPAS"><span class="stat-num" id="statPAS">--</span><span class="stat-label">PAS</span></div>
                    <div class="stat-box" id="itemDRI"><span class="stat-num" id="statDRI">--</span><span class="stat-label">DRI</span></div>
                    <div class="stat-box" id="itemDEF"><span class="stat-num" id="statDEF">--</span><span class="stat-label">DEF</span></div>
                    <div class="stat-box" id="itemPHY"><span class="stat-num" id="statPHY">--</span><span class="stat-label">PHY</span></div>
                </div>
            </div>
        </div>

        <button class="spin-wheel-trigger-btn" id="openWheelBtn" disabled>🎡 SPIN STAT WHEEL</button>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="control-panel">
            <div class="wheel-header">
                <div class="status-msg" id="statusMsg">Select a stat!</div>
                <button class="close-btn" id="closeBtn">✕ Close</button>
            </div>
            <div class="wheel-box">
                <div class="wheel-pointer"></div>
                <svg class="wheel-svg" id="wheelSvg" viewBox="0 0 300 300"></svg>
            </div>
            <button class="spin-btn" id="spinBtn">Spin Wheel</button>
        </div>
    </div>

    <script>
        const playerSearch = document.getElementById("playerSearch");
        const suggestionsList = document.getElementById("suggestionsList");
        const spinBtn = document.getElementById("spinBtn");
        const closeBtn = document.getElementById("closeBtn");
        const openWheelBtn = document.getElementById("openWheelBtn");
        const wheelSvg = document.getElementById("wheelSvg");
        const modalOverlay = document.getElementById("modalOverlay");
        const statusMsg = document.getElementById("statusMsg");

        const fcCard = document.getElementById("fcCard");
        const cardName = document.getElementById("cardName");
        const cardOvr = document.getElementById("cardOvr");
        const cardPos = document.getElementById("cardPos");
        const playerPic = document.getElementById("playerPic");

        const stats = {
            PAC: { val: document.getElementById("statPAC"), item: document.getElementById("itemPAC") },
            SHO: { val: document.getElementById("statSHO"), item: document.getElementById("itemSHO") },
            PAS: { val: document.getElementById("statPAS"), item: document.getElementById("itemPAS") },
            DRI: { val: document.getElementById("statDRI"), item: document.getElementById("itemDRI") },
            DEF: { val: document.getElementById("statDEF"), item: document.getElementById("itemDEF") },
            PHY: { val: document.getElementById("statPHY"), item: document.getElementById("itemPHY") }
        };

        let selectedPlayer = null;
        let activeStatKey = "PAC";
        let cardStats = { PAC: null, DRI: null, SHO: null, DEF: null, PAS: null, PHY: null };
        let currentRotation = 0;

        const defaultSilhouette = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='32' r='20' fill='%23ffffff'/><path d='M20 90 C20 60, 30 50, 50 50 C70 50, 80 60, 80 90 Z' fill='%23ffffff'/></svg>";

        playerPic.onerror = function() {
            this.src = defaultSilhouette;
        };

        const wheelNumbers = [];
        for (let i = 50; i <= 99; i++) wheelNumbers.push(i);
        const totalSegments = wheelNumbers.length;
        const segmentAngle = 360 / totalSegments;

        // Player database with headshots via Wikimedia Commons / transparent player renders
        const playersDb = [
            { id: "pele", name: "Pelé", pos: "CAM", isIcon: true, img: "https://upload.wikimedia.org/wikipedia/commons/5/54/Pele_by_John_Mathew_Smith_crop.png" },
            { id: "zidane", name: "Zidane", pos: "CM", isIcon: true, img: "https://upload.wikimedia.org/wikipedia/commons/f/f3/Zinedine_Zidane_by_Tasnim_03.jpg" },
            { id: "mbappe", name: "Mbappé", pos: "ST", img: "https://upload.wikimedia.org/wikipedia/commons/5/57/Kylian_Mbapp%C3%A9_2018.jpg" },
            { id: "haaland", name: "Haaland", pos: "ST", img: "https://upload.wikimedia.org/wikipedia/commons/3/33/Erling_Haaland_2023.jpg" },
            { id: "bellingham", name: "Bellingham", pos: "CAM", img: "https://upload.wikimedia.org/wikipedia/commons/e/eb/Jude_Bellingham_2023.jpg" },
            { id: "messi", name: "Messi", pos: "CF", img: "https://upload.wikimedia.org/wikipedia/commons/b/b4/Lionel-Messi-Argentina-2022-World-Cup_%28cropped%29.jpg" },
            { id: "ronaldo", name: "Ronaldo", pos: "ST", img: "https://upload.wikimedia.org/wikipedia/commons/8/8c/Cristiano_Ronaldo_2018.jpg" },
            { id: "vini", name: "Vinícius Jr.", pos: "LW", img: "https://upload.wikimedia.org/wikipedia/commons/f/f3/Vinicius_Junior_2021.jpg" },
            { id: "yamal", name: "Lamine Yamal", pos: "RW", img: "https://upload.wikimedia.org/wikipedia/commons/a/a2/Lamine_Yamal_2024.jpg" },
            { id: "saka", name: "Saka", pos: "RW", img: "https://upload.wikimedia.org/wikipedia/commons/3/3d/Bukayo_Saka_2021.jpg" }
        ];

        playerSearch.addEventListener("input", () => {
            const query = playerSearch.value.trim().toLowerCase();
            suggestionsList.innerHTML = "";

            if (!query) {
                suggestionsList.classList.remove("active");
                return;
            }

            const matches = playersDb.filter(p => p.name.toLowerCase().includes(query));

            if (matches.length > 0) {
                matches.forEach(p => {
                    const item = document.createElement("div");
                    item.className = "suggestion-item";
                    item.innerHTML = `<span>${p.name}</span> <strong>${p.pos}</strong>`;
                    item.addEventListener("click", () => selectPlayer(p));
                    suggestionsList.appendChild(item);
                });
                suggestionsList.classList.add("active");
            } else {
                suggestionsList.classList.remove("active");
            }
        });

        function selectPlayer(player) {
            selectedPlayer = player;
            playerSearch.value = player.name;
            suggestionsList.classList.remove("active");

            cardName.innerText = player.name;
            cardPos.innerText = player.pos;

            playerPic.style.opacity = "0";
            playerPic.src = player.img || defaultSilhouette;
            playerPic.onload = () => { playerPic.style.opacity = "1"; };

            openWheelBtn.disabled = false;
            resetCardStats();
            updateCardTier(85);
        }

        function resetCardStats() {
            cardOvr.innerText = "--";
            for (const s in stats) {
                cardStats[s] = null;
                stats[s].val.innerText = "--";
            }
        }

        function updateCardTier(ovr) {
            fcCard.className = "";

            if (selectedPlayer && selectedPlayer.isIcon) {
                fcCard.classList.add("card-icon");
                return;
            }

            if (ovr === null || isNaN(ovr)) {
                fcCard.classList.add("card-blank");
                return;
            }

            if (ovr < 65) {
                fcCard.classList.add("card-bronze");
            } else if (ovr < 75) {
                fcCard.classList.add("card-silver");
            } else if (ovr < 92) {
                fcCard.classList.add("card-gold");
            } else {
                fcCard.classList.add("card-toty");
            }
        }

        function buildNumberedWheel() {
            let svgContent = "";
            const cx = 150, cy = 150, r = 140;

            wheelNumbers.forEach((num, index) => {
                const startAngle = index * segmentAngle;
                const endAngle = (index + 1) * segmentAngle;
                
                const radStart = ((startAngle - 90) * Math.PI) / 180;
                const radEnd = ((endAngle - 90) * Math.PI) / 180;

                const x1 = cx + r * Math.cos(radStart);
                const y1 = cy + r * Math.sin(radStart);
                const x2 = cx + r * Math.cos(radEnd);
                const y2 = cy + r * Math.sin(radEnd);

                const color = index % 2 === 0 ? "#0f2027" : "#203a43";
                
                svgContent += `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z" fill="${color}" stroke="#00ff88" stroke-width="0.5"/>`;

                const textAngle = startAngle + (segmentAngle / 2);
                const textRad = ((textAngle - 90) * Math.PI) / 180;
                const textR = r - 20; 
                const tx = cx + textR * Math.cos(textRad);
                const ty = cy + textR * Math.sin(textRad);

                svgContent += `<text x="${tx}" y="${ty}" fill="#00ff88" font-size="8" font-weight="900" text-anchor="middle" transform="rotate(${textAngle}, ${tx}, ${ty})" dominant-baseline="central">${num}</text>`;
            });

            svgContent += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#00ff88" stroke-width="3"/>`;
            svgContent += `<circle cx="${cx}" cy="${cy}" r="20" fill="#00ff88" stroke="#06090e" stroke-width="3"/>`;

            wheelSvg.innerHTML = svgContent;
        }

        function selectStat(statKey) {
            if (!selectedPlayer) return;

            if (!statKey) {
                const unspunKey = Object.keys(cardStats).find(key => cardStats[key] === null);
                activeStatKey = unspunKey || "PAC";
            } else {
                activeStatKey = statKey;
            }

            modalOverlay.classList.add("visible");
            spinBtn.disabled = false;
            spinBtn.innerText = `SPIN FOR ${activeStatKey}`;
            statusMsg.innerText = `ROLLING ${activeStatKey}`;
        }

        closeBtn.addEventListener("click", () => modalOverlay.classList.remove("visible"));
        openWheelBtn.addEventListener("click", () => selectStat(null));

        Object.keys(stats).forEach(statKey => {
            stats[statKey].item.addEventListener("click", () => selectStat(statKey));
        });

        spinBtn.addEventListener("click", () => {
            if (!activeStatKey) return;

            spinBtn.disabled = true;
            spinBtn.innerText = "SPINNING...";

            const selectedIndex = Math.floor(Math.random() * totalSegments);
            const chosenValue = wheelNumbers[selectedIndex];

            const targetWedgeAngle = (selectedIndex * segmentAngle) + (segmentAngle / 2);
            const correctiveRotation = 360 - targetWedgeAngle; 

            const extraSpins = 1440; 
            currentRotation += extraSpins + correctiveRotation - (currentRotation % 360);

            wheelSvg.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                cardStats[activeStatKey] = chosenValue;
                stats[activeStatKey].val.innerText = chosenValue;

                let sum = 0, count = 0;
                for (const s in cardStats) {
                    if (cardStats[s] !== null) {
                        sum += cardStats[s];
                        count++;
                    }
                }
                const finalOvr = Math.round(sum / count);
                cardOvr.innerText = finalOvr;
                
                updateCardTier(finalOvr);

                spinBtn.innerText = "DONE!";
                statusMsg.innerText = `LANDED ON ${chosenValue}!`;
                
                setTimeout(() => {
                    if (modalOverlay.classList.contains("visible")) closeBtn.click();
                }, 1200);
            }, 4000);
        });

        buildNumberedWheel();
    </script>
</body>
</html>
